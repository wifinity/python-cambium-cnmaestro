          type: object
          $ref: '#/components/schemas/firewall'
        dns:
          type: object
          $ref: '#/components/schemas/dns'
        threat_protection:
          type: object
          $ref: '#/components/schemas/threatProtection'
        vpn:
          type: object
          $ref: '#/components/schemas/vpn'
        user_defined_overrides:
          description: User-Defined Overrides.
          type:
            - string
            - 'null'
