      type: object
      title: wifi-enterprise
      additionalProperties: false
      minProperties: 1
      properties:
        target_managed_account:
          description: Managed account ID to which the device should be moved
          type: string
        ap_group:
          description: The target ap group to be applied on the device
          oneOf:
            - type: string
            - type: 'null'
        approved:
          description: Pre-approve the device after claim
          type: boolean
        description:
          description: Basic information about the device
          type: string
          default: ''
        floorplan:
          description: Holds x/y coordinates of device for a site floorplan
          type: object
          additionalProperties: false
          properties:
            x:
              description: x coordinate to place the device on the floorplan of a site
              type: number
            'y':
              description: y coordinate to place the device on the floorplan of a site
              type: number
        latitude:
          description: Latitude coordinate (in decimal format) of the AP
          type: number
          minimum: -90
          maximum: 90
        longitude:
          description: Longitude coordinate (in decimal format) of the AP
          type: number
          minimum: -180
          maximum: 180
        name:
          description: Name of the Device
          type: string
          minLength: 2
          maxLength: 64
        network:
          description: Name of the network
          type: string
          minLength: 1
        overrides:
          description: Override variables for cnPilot E devices
          type: object
          additionalProperties: false
          properties:
            network:
              type: object
              additionalProperties: false
              properties:
                auto_set:
                  description: If set to true, gateway, DNS and native VLAN values read from device will be used
                  type: boolean
                  default: true
                default_gw:
                  description: Default Gateway of the AP
                  type: string
                dns_server_1:
                  description: Primary DNS server address of the AP
                  type: string
                dns_server_2:
                  description: Secondary DNS server address of the AP
                  type: string
                vlans:
                  description: Vlan override
                  type: array
                  minItems: 1
                  maxItems: 4094
                  uniqueItems: true
                  items:
                    type: object
                    additionalProperties: false
                    required:
                      - id
                    properties:
                      id:
                        type: number
                        minimum: 1
                        maximum: 4094
                      ip:
                        type: string
                      mask:
                        type: string
                      mode:
                        type: string
                        enum:
                          - dhcp
                          - static
            location:
              description: Set the AP location
              type: string
              minLength: 1
              maxLength: 64
            placement:
              description: Set the AP placement details
              type: string
              enum:
                - indoor
                - outdoor
            radio:
              description: Radio overrides
              type: object
              properties:
                sdr:
                  description: Model-specific settings
                  type: object
                  additionalProperties: false
                  properties:
                    xv3_8:
                      description: XV3-8 settings
                      type: object
                      properties:
                        radio_2_band:
                          description: Select the band or split 8x8 5 GHz radio into two 4x4 5 GHz radios.
                          default: 5ghz
                          type: string
                          enum:
                            - 5ghz
                            - 5ghz-split
                        sbs_mode:
                          description: Enable or disable dual 5 GHz Radio.  Splits 8x8 5 GHz radio into two 4x4 5 GHz radios. (Legacy.  Replaced by radio_2_band)
                          default: disabled
                          type: string
                          enum:
                            - enabled
