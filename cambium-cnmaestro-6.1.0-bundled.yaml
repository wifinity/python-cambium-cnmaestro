                      radio_1_band:
                        type: string
                        description: "Band assignment for radio 1."
                      radio_2_band:
                        type: string
                        description: "Band assignment for radio 2."
                      radio_3_band:
                        type: string
                        description: "Band assignment for radio 3."
                      radio_4_band:
                        type: string
                        description: "Band assignment for radio 4."
              bands:
                type: array
                description: "Per-band radio configurations (2.4 GHz, 5 GHz, 6 GHz)."
                items:
                  type: object
                  properties:
                    type:
                      type: string
                      description: "Band type identifier (2.4, 5, or 6)."
                    enabled:
                      type: boolean
                      description: "Whether this radio band is enabled."
