            - 'false'
        vpn_server_shared_secret:
          description: Configure shared secret
          oneOf:
            - type: string
              minLength: 1
              maxLength: 32
            - type: 'null'
        vpn_server_interface:
          type: string
          default: all
          enum:
            - wan1
            - wan2
            - all
        ike_eap_vpn:
          type: boolean
          default: false
        ike_eap_vpn_server:
          type: object
