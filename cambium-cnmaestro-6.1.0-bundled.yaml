    devices.yaml#device: |
      device.commit:
        type: object
        additionalProperties: false
        properties:
          message:
            type: string
            description: "Result message of the commit operation."
          job_id:
            type: string
            description: "Job ID if a configuration job was created as part of the commit."
          state:
            type: string
            description: "State of the created job (e.g., 'started', 'not_started')."
          error:
            type: object
            description: "Error details if any warnings occurred during commit."
        example:
          message: "Success"

      device.action.initiate:
        type: object
        additionalProperties: false
        properties:
          data:
            type: object
            additionalProperties: false
            properties:
              result:
                type: string
                description: "Message indicating the action was initiated."
              url:
                type: string
                description: "URL to retrieve the action results using a GET request."
        example:
          data:
            result: "Please fetch the status using GET request before it expires in 5 mins"
            url: "/api/v2/devices/90:6D:62:E0:25:04/ping"

      device.reboot:
        type: object
        additionalProperties: false
        properties:
          message:
            type: string
            description: "Confirmation message for the reboot request."
        example:
          message: "Reboot request submitted successfully. Please check the device."

      device.action.ping:
        type: object
        additionalProperties: false
        properties:
          message:
            type: object
            additionalProperties: false
            properties:
              status:
                type: string
                description: "Status of the ping operation (e.g., 'in_progress', 'complete')."
              data:
                type: array
                items:
                  type: string
                description: "Ping output lines."
        example:
          message:
            status: "complete"
            data:
              - "PING 8.8.8.8 (8.8.8.8): 56 data bytes\n64 bytes from 8.8.8.8: seq=0 ttl=115 time=16.070 ms\n64 bytes from 8.8.8.8: seq=1 ttl=115 time=10.918 ms\n64 bytes from 8.8.8.8: seq=2 ttl=115 time=10.963 ms\n\n--- 8.8.8.8 ping statistics ---\n3 packets transmitted, 3 packets received, 0% packet loss\nround-trip min/avg/max = 10.918/12.650/16.070 ms\n"

      device.action.cli:
        type: object
        additionalProperties: false
        properties:
          message:
            type: object
            additionalProperties: false
            properties:
              status:
                type: string
                description: "Status of the CLI command execution (e.g., 'in_progress', 'complete')."
              data:
                type: array
                items:
                  type: string
                description: "CLI command output lines."
        example:
          message:
            status: "complete"
            data:
              - "System version: 7.0.0"

      device.action.pull_config:
        type: object
        additionalProperties: false
        properties:
          message:
            type: object
            additionalProperties: false
            properties:
              status:
                type: string
                description: "Status of the pull configuration request (e.g., 'in_progress', 'complete')."
              data:
                type: string
                description: "Device configuration file content."
        example:
          message:
            status: "complete"
            data: "!\nmanagement http port 80\ncountry-code US\nhostname <hostname>\n"

      device.action.traceroute:
        type: object
        additionalProperties: false
        properties:
          message:
            type: object
            additionalProperties: false
            properties:
              status:
                type: string
                description: "Status of the traceroute operation (e.g., 'in_progress', 'complete')."
              data:
                type: array
                items:
                  type: string
                description: "Traceroute output lines."
        example:
          message:
            status: "complete"
            data:
              - "traceroute to 8.8.8.8 (8.8.8.8), 30 hops max, 46 byte packets\n 1  192.0.2.1 (192.0.2.1)  1.827 ms  1.976 ms  1.384 ms\n 2  198.51.100.1 (198.51.100.1)  2.985 ms  3.151 ms  2.588 ms\n"
