            aeroscout_srv_port:
              description: Configure AeroScout Port
              default: ''
              anyOf:
                - type: integer
                  minimum: 1
                  maximum: 65535
                - type: string
                  enum:
                    - ''
        shared:
          type: boolean
          default: false
          description: Indicates if this AP Group should be sharable with managed accounts.  Only applicable for Base Infrastructure AP Groups.  Defaults to false.  Only supported for POST requests.
        vlans:
          type: array
          items:
            type: object
            additionalProperties: false
            required:
              - id
              - ip_mode
              - ip_addr
              - subnet_mask
              - nat
              - zero_conf
              - management_access
              - circuit_id
              - remote_id
              - dhcp_request_opt_all
              - ipv6_mode
              - ipv6_addr
              - ipv6_prefix_len
              - ipv6_request_opt_all
            properties:
              id:
                description: VLAN ID should be between 1 and 4094
                type: integer
                minimum: 1
                maximum: 4094
              ip_mode:
                description: IP Address mode
                type: string
                enum:
                  - dhcp
                  - static
              ip_addr:
                description: Static IPv4 IP address
                type: string
                oneOf:
                  - format: CNS_IPv4
                  - enum:
                      - ''
              subnet_mask:
                description: Static IPv4 netmask
                type: string
                oneOf:
                  - format: CNS_IPv4
                  - enum:
                      - ''
              nat:
                description: Hides IP Addresses under this SVI using NAT
                type: boolean
              zero_conf:
                description: 'Zeroconf IP: Support 169.254.x.x local IP address.  Only applicable for VLAN 1'
                type: boolean
              management_access:
                description: CLI/GUI/SNMP access via this interface
                type: string
                default: allow-wired-wireless
                enum:
                  - block
                  - allow-wired
                  - allow-wired-wireless
              relay_dhcp_server_ip:
                description: Enable relay agent and assign DHCP server
                type: string
                format: CNS_IPv4
              circuit_id:
                description: DHCP Option 82 Circuit ID.
                default: ''
                anyOf:
                  - type: string
                  - type: string
                    enum:
                      - disabled
                      - all
                      - hostname
                      - apmac
                      - bssid
                      - ssid
              remote_id:
                description: DHCP Option 82 Remote ID.
                default: ''
                anyOf:
                  - type: string
                  - type: string
                    enum:
                      - disabled
                      - hostname
                      - apmac
                      - bssid
                      - ssid
                type: string
              dhcp_request_opt_all:
                description: Enable dhcp request option all on this interface
                type: boolean
              ipv6_mode:
                description: IPv6 mode
                type: string
                enum:
                  - disabled
                  - static
                  - stateless-dhcpv6
                  - stateful-dhcpv6
                  - auto
              ipv6_addr:
                description: IPv6 Address.  "0::0" if not in use.
                type: string
                format: CNS_IPv6
              ipv6_prefix_len:
                description: IPv6 Prefix Length.  0 for non-Static ipv6_mode.
                default: 0
                type: integer
                minimum: 0
                maximum: 127
              ipv6_request_opt_all:
                description: Enable IPv6 request option all on this interface
                type: boolean
              management_svi_enable6:
                description: Use IPv6 Gateway, DNS, DHCPv6 options received on this interface
                type: boolean
        vlan_pool:
          type: array
          items:
            type: object
            additionalProperties: false
            required:
              - vlan_ids
              - vlan_name
            properties:
              vlan_ids:
                description: VLAN ID List. e.g 1-10,15,100
                type: string
                pattern: '^(?:[1-9]|[1-9]\d|[1-9]\d\d|[1-3]\d{0,3}|40[0-8]\d|409[0-4])(?: *- *(?:[1-9]|[1-9]\d|[1-9]\d\d|[1-3]\d{0,3}|40[0-8]\d|409[0-4]))?(?: *, *(?:[1-9]|[1-9]\d|[1-9]\d\d|[1-3]\d{0,3}|40[0-8]\d|409[0-4])(?: *- *(?:[1-9]|[1-9]\d|[1-9]\d\d|[1-3]\d{0,3}|40[0-8]\d|409[0-4]))?)*$'
              vlan_name:
                description: VLAN Pool Name
                type: string
                pattern: ^([a-zA-Z0-9_\-]{1,64})$
        wlans:
          type: array
          minItems: 1
          description: Ordered name(s) of WLANs that should be attached to the AP Group.
          maxItems: 16
          uniqueItems: true
          items:
            type: string
        access_control:
          description: Name of access control policy and enabled/disabled
          type: object
          additionalProperties: false
          properties:
            enable_acp:
              type: boolean
              default: false
              description: Indicates if access control policy is attached to the AP Group.
            ap_group_acp:
              type: string
              description: Name of access control policy that should be attached to the AP Group.
            user_group_policies:
              type: array
              description: List of user group policies that should be attached to the AP Group.
              maxItems: 16
              items:
                type: object
                additionalProperties: false
                required:
                  - name
                  - radius_filter_id
                  - acp
                properties:
                  name:
                    type: string
                    description: Name of user group policy.
                  radius_filter_id:
                    type: string
                    description: RADIUS Filter-ID
                    minLength: 1
                    maxLength: 32
                  acp:
                    type: string
                    description: Name of access control policy that should be attached to the user group policy. Only Non-MAC Based Policy is supported.
                  vlan:
                    type: integer
                    description: VLAN ID
                    minimum: 1
                    maximum: 4094
            device_policies:
              type: array
              description: List of device policies that should be attached to the AP Group.
              maxItems: 16
              items:
                type: object
                additionalProperties: false
                required:
                  - name
                  - device_class
                  - device_type
                  - acp
                properties:
                  name:
                    type: string
                    description: Name of user group policy.
                  device_class:
                    type: string
                    description: Device Class
                    enum:
                      - ap
                      - appliance
                      - car
                      - desktop
                      - game
                      - notebook
                      - phone
                      - player
                      - tablet
                      - watch
                  device_type:
                    type: string
                    description: Device Type
                    enum:
                      - all
                      - android
                      - any
                      - appletv
                      - archos
                      - blackberry
                      - chrome
                      - danger
                      - directv
                      - docomo
                      - ericsson
                      - googletv
                      - ipad
                      - iphone
                      - ipod
                      - kddi
                      - kindle
                      - linux
                      - mac
                      - nintendo
                      - nokia
                      - palm
                      - playstation
                      - samsung
                      - symbian
                      - thermostat
                      - vodafone
                      - webos
                      - wii
                      - windows
                      - winmobile
                      - xbox
                  acp:
                    type: string
                    description: Name of access control policy that should be attached to the device policy. Only Non-MAC Based Policy is supported.
    body-60:
      allOf:
        - $ref: '#/components/schemas/ap_group_body'
        - type: object
          required:
            - name
            - wlans
    switch_groups.yaml#switch_groups: |
      switch_groups.list:
        type: object
        additionalProperties: false
        properties:
          paging:
            $ref: "../common/paging.yaml#paging"
          data:
            type: array
            items:
              $ref: "#switch_group.item"
        example:
          paging:
            offset: 0
            limit: 2
            total: 392
          data:
            - name: "Switch-Group-1"
              description: ""
              auto_sync: false
              managed_account: "Account 1"
              shared: false
              overrides: ""
              basic:
                contact: ""
                poe_autodetect_cnmedusa: true
                poe_autodetect_cnwave: true
                antenna_administration_status: true
                high_temperature_mode: false
                cnpulse_administration_status: true
                cnpulse_power: false
                input_dc_voltage: true
              management:
                enable_telnet: true
                enable_http: false
                enable_ssh: true
                dns_server_1: ""
                dns_server_2: ""
                sys_log_server_port: null
                sys_log_server_address: ""
                admin_access:
                  - username: "admin"
                    privilege: 15
                  - username: "guest"
                    privilege: 1
                time_zone: "Asia/Kolkata"
                time_zone_name: "UTC"
                selected_time_zone: "+05:30"
                daylight_saving_time: false
                minimum_sys_log_level: 5
                snmp_enable: true
                snmp_readonly_community: ""
                snmp_readwrite_community: ""
                snmp_trap_ipaddress: ""
                snmp_username: "snmpuser"
                snmp_user_authkey: "*****"
                snmp_user_privkey: "*****"
                snmp_user_access: true
                snmp_userauth_protocol: "SHA256"
                snmp_user_priv_protocol: "None"
                clear_snmp_data: true
              network:
                enable_igmp_snoop: false
                enable_dhcp_snoop: false
                mtu: 1500
                vlan_list:
                  - vlan_name: "vlan1"
                    vlan_index: "1"
                    enable_igmp_snooping: false
                    enable_dhcp_snooping: false
                    enable_arp_insp: false
                    enable_voice_vlan: false
                    enable_data_vlan: false
                auto_attach: true
                auto_attach_vlan: true
                cambium_stp_mode: "RSTP"
                stp_priority: 32768
                default_gateway: ""
                stp_path_cost: "long"
              security:
                radius_primary_server: ""
                radius_server_list:
                  - radius_authclient_server_portnumber: 1812
                pnac_authorization_server: false
                dynamic_authorization_port: 3799

      switch_group.item:
        type: object
        additionalProperties: false
        properties:
          name:
            type: string
            description: "Unique name of the Switch Group."
          description:
            type: string
            description: "Description of the Switch Group."
          auto_sync:
            type: boolean
            description: "Whether configuration auto-sync to devices is enabled."
          managed_account:
            type: string
            description: "Managed account this Switch Group belongs to."
          shared:
            type: boolean
            description: "Whether this Switch Group is shared across accounts."
          overrides:
            type: string
            description: "Custom override configuration."
          basic:
            type: object
            description: "Basic Switch Group settings."
            properties:
              contact:
                type: string
                description: "System contact string."
              poe_autodetect_cnmedusa:
                type: boolean
                description: "Whether PoE auto-detection for cnMedusa is enabled."
              poe_autodetect_cnwave:
                type: boolean
                description: "Whether PoE auto-detection for cnWave is enabled."
              antenna_administration_status:
                type: boolean
                description: "Whether GPS internal antenna administration is enabled."
              high_temperature_mode:
                type: boolean
                description: "Whether high temperature mode is enabled."
              cnpulse_administration_status:
                type: boolean
                description: "Whether cnPulse GPS external source administration is enabled."
              cnpulse_power:
                type: boolean
                description: "Whether cnPulse power output is enabled."
              input_dc_voltage:
                type: boolean
                description: "Whether DC voltage input monitoring is enabled."
          management:
            type: object
            description: "Management access, SNMP, and syslog settings."
            properties:
              enable_telnet:
                type: boolean
                description: "Whether Telnet management access is enabled."
              enable_http:
                type: boolean
                description: "Whether HTTP management access is enabled."
              enable_ssh:
                type: boolean
                description: "Whether SSH management access is enabled."
              dns_server_1:
                type: string
                description: "Primary DNS server address."
              dns_server_2:
                type: string
                description: "Secondary DNS server address."
              sys_log_server_port:
                type: integer
                nullable: true
                description: "Syslog server port number."
              sys_log_server_address:
                type: string
                description: "Syslog server address."
              admin_access:
                type: array
                description: "List of admin user accounts with privilege levels."
                items:
                  type: object
                  properties:
                    username:
                      type: string
                      description: "Admin username."
                    privilege:
                      type: integer
                      description: "Privilege level (1=guest, 15=admin)."
              time_zone:
                type: string
                description: "Time zone identifier."
              time_zone_name:
                type: string
                description: "Time zone name."
              selected_time_zone:
                type: string
                description: "Selected UTC offset (e.g., +05:30)."
              daylight_saving_time:
                type: boolean
                description: "Whether daylight saving time is enabled."
              minimum_sys_log_level:
                type: integer
                description: "Minimum syslog severity level to log (0-7)."
              snmp_enable:
                type: boolean
                description: "Whether SNMP is enabled."
              snmp_readonly_community:
                type: string
                description: "SNMP read-only community string."
              snmp_readwrite_community:
                type: string
                description: "SNMP read-write community string."
              snmp_trap_ipaddress:
                type: string
                description: "SNMP trap destination IP address."
              snmp_username:
                type: string
                description: "SNMPv3 username."
              snmp_user_authkey:
                type: string
                description: "SNMPv3 authentication key (masked)."
              snmp_user_privkey:
                type: string
                description: "SNMPv3 privacy key (masked)."
              snmp_user_access:
                type: boolean
                description: "Whether SNMPv3 user access is enabled."
              snmp_userauth_protocol:
                type: string
                description: "SNMPv3 authentication protocol (e.g., SHA256)."
              snmp_user_priv_protocol:
                type: string
                description: "SNMPv3 privacy protocol (e.g., AES, None)."
              clear_snmp_data:
                type: boolean
                description: "Whether SNMP data is cleared on sync."
          network:
            type: object
            description: "Network and VLAN configuration."
            properties:
              enable_igmp_snoop:
                type: boolean
                description: "Whether IGMP snooping is enabled globally."
              enable_dhcp_snoop:
                type: boolean
                description: "Whether DHCP snooping is enabled globally."
              mtu:
                type: integer
                description: "System MTU in bytes."
              vlan_list:
                type: array
                description: "List of VLAN configurations."
                items:
                  type: object
                  properties:
                    vlan_name:
                      type: string
                      description: "VLAN name."
                    vlan_index:
                      description: "VLAN ID."
                    enable_igmp_snooping:
                      type: boolean
                      description: "Whether IGMP snooping is enabled on this VLAN."
                    enable_dhcp_snooping:
                      type: boolean
                      description: "Whether DHCP snooping is enabled on this VLAN."
                    enable_arp_insp:
                      type: boolean
                      description: "Whether ARP inspection is enabled on this VLAN."
                    enable_voice_vlan:
                      type: boolean
                      description: "Whether this VLAN is designated as a voice VLAN."
                    enable_data_vlan:
                      type: boolean
                      description: "Whether this VLAN is designated as a data VLAN."
              auto_attach:
                type: boolean
                description: "Whether Auto-Attach is enabled."
              auto_attach_vlan:
                type: boolean
                description: "Whether Auto-Attach VLAN configuration is enabled."
              site_name_pba_localization:
                type: boolean
                description: "Whether site name PBA localization is enabled."
              selected_method:
                type: string
                description: "Selected provisioning method (e.g., TFTP)."
              cambium_stp_mode:
                type: string
                description: "Spanning Tree Protocol mode (RSTP/MSTP/STP)."
              stp_priority:
                type: integer
                description: "STP bridge priority."
              pvrst_priority_list:
                type: array
                description: "Per-VLAN STP priority list."
                items:
                  type: object
                  properties:
                    vlan:
                      type: integer
                      description: "VLAN ID."
                    stp_priority:
                      type: integer
                      description: "STP priority for this VLAN."
              default_gateway:
                type: string
                description: "Default gateway IP address."
              revision:
                type: integer
                description: "MST configuration revision number."
              stp_path_cost:
                type: string
                description: "STP path cost method (long/short)."
          security:
            type: object
            description: "RADIUS and port authentication security settings."
            properties:
              radius_primary_server:
                type: string
                description: "Primary RADIUS server address."
              radius_server_list:
                type: array
                description: "List of RADIUS server configurations."
                items:
                  type: object
                  properties:
                    radius_authclient_server_portnumber:
                      type: integer
                      description: "RADIUS authentication server port."
              pnac_authorization_server:
                type: boolean
                description: "Whether PNAC authorization server is enabled."
              dynamic_authorization_port:
                type: integer
                description: "Dynamic Authorization (CoA) server port."
    switch_group_body:
      type: object
      additionalProperties: false
      properties:
        basic:
          type: object
          additionalProperties: false
          properties:
            contact:
              description: contact
              type: string
              minLength: 0
              maxLength: 64
            poe_autodetect_cnmedusa:
              description: automatically sets poe mode to hybrid
              type: boolean
              default: true
            poe_autodetect_cnwave:
              description: automatically sets poe mode to hybrid
              type: boolean
              default: true
            antenna_administration_status:
              description: enable internal antenna for gps sync
              type: boolean
              default: true
            high_temperature_mode:
              description: lower poe budget for switch to operate in high temperature mode (TX2K only)
              type: boolean
              default: false
            cnpulse_administration_status:
              description: enable cnpulse for gps sync
              type: boolean
              default: true
            cnpulse_power:
              description: enable poe to power cnpulse
              type: boolean
              default: false
            input_dc_voltage:
              description: True sets poe budget 120W (9-60V) and false for 170W (30-60V)
              type: boolean
              default: true
        managed_account:
          description: Managed account ID of the Switch Group being created/edited
          type: string
        management:
          type: object
          additionalProperties: false
          properties:
            enable_telnet:
              description: enable telnet
              type: boolean
              default: false
            enable_http:
              description: enable http
              type: boolean
              default: true
            enable_https:
              description: enable https
              type: boolean
              default: true
            enable_ssh:
              description: enable ssh
              type: boolean
              default: true
            dns_server_1:
              description: DNS Server 1
              type: string
            dns_server_2:
              description: DNS Server 2
              type: string
            admin_access:
              type: array
              description: Contains details of users
              items:
                type: object
                additionalProperties: false
                properties:
                  username:
                    description: username
                    type: string
                    default: admin
                  user_password:
                    description: user password, must contain 1 upppercase , 1 lowercase and 1 numeric character of lenth between 8-20
                    type: string
                    pattern: ^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z]).{8,20}$
                    minLength: 8
                    maxLength: 20
                    default: Admin@123
                  privilege:
                    description: set 15 for root privileges or 1 for guest privileges.
                    type: integer
                    enum:
                      - 1
                      - 15
                    default: 15
            time_setting_server:
              description: SNTP Server Address
              type: string
            time_zone:
              description: selected timezone, eg "Etc/GMT+12 (Mandatory parameter while creating Switch Group)."
              type: string
              default: Etc/GMT+12
            time_zone_name:
              description: set time zone name (3-6) capital letters e.g. EST, PST, AST, IST UTC etc.
              type: string
              default: UTC
            selected_time_zone:
              description: offset from UTC, i.e. "-12:00".
              type: string
              default: '-12:00'
            summer_time_zone_name:
              description: set summer time zone name to be displayed during Day light savings (3-6) capital letters e.g. EST, PST, AST, IST etc. default value set is UTC
              type: string
              default: UTC
            daylight_saving_time:
              description: enable or disable daylight saving time
              type: boolean
              default: false
            dist_start_time:
              description: start distribution time, eg First-Sun-Jan,12:00
              type: string
            dist_end_time:
              description: Time to end the DST settings, eg First-Sun-Jan,13:00
              type: string
            minimum_sys_log_level:
              description: minimum system log level
              type: integer
              default: 5
            sys_log_server_address:
              description: Server Address
              type: string
            sys_log_server_port:
              description: server port
              type: integer
            snmp_enable:
              description: enable SNMP support on the device
              type: boolean
              default: true
            snmp_readonly_community:
              description: snmp readonly community
              type: string
              minLength: 0
              maxLength: 32
            snmp_readwrite_community:
              description: snmp read write community
              type: string
              minLength: 0
              maxLength: 32
            snmp_trap_ipaddress:
              description: snmp trap IP address
              type: string
            snmp_username:
              description: snmp user name
              type: string
              minLength: 0
              maxLength: 32
            snmp_user_authkey:
              description: SNMPv3 authentication Key
              type: string
              minLength: 0
              maxLength: 32
              default: None
            snmp_user_privkey:
              description: SNMPv3 privacy key
              type: string
              minLength: 0
              maxLength: 32
            snmp_user_access:
              description: enable snmp user access
              type: boolean
              default: true
            snmp_userauth_protocol:
              description: enable snmp user authentication protocol
              type: string
              default: None
              enum:
                - None
                - MD5
                - SHA
                - SHA224
                - SHA256
                - SHA384
                - SHA512
            snmp_user_priv_protocol:
              description: enable snmp user private protocol
              type: string
              default: None
              enum:
                - None
                - DES
                - TDES
                - AES
                - AES192
                - AES256
            clear_snmp_data:
              description: reset SNMP settings
              type: boolean
              default: false
        network:
          type: object
          additionalProperties: false
          properties:
            enable_igmp_snoop:
              description: IGMP snooping
              type: boolean
              default: false
            enable_dhcp_snoop:
              description: DHCP Snooping
              type: boolean
              default: false
            mtu:
              description: configure same MTU value on all ports
              type: integer
              default: 1500
            default_gateway:
              description: Configure if Switches have static IP address assigned
              type: string
            vlan_list:
              type: array
              description: Contains vlan list
              items:
                type: object
                additionalProperties: false
                properties:
                  vlan_name:
                    description: name of vlan
                    type: string
                    default: vlan1
                  vlan_index:
                    description: vlan index, Multiple vlans can be sent like this '1,15,151'.
                    type: string
                    default: '1'
                  enable_igmp_snooping:
                    description: enable igmp snooping
                    type: boolean
                    default: false
                  enable_dhcp_snooping:
                    description: enable dhcp snooping
                    type: boolean
                    default: false
                  enable_arp_insp:
                    description: enable arp insp
                    type: boolean
                    default: false
                  enable_voice_vlan:
                    description: enable voice vlan
                    type: boolean
                    default: false
                  enable_data_vlan:
                    description: enable data vlan
                    type: boolean
                    default: false
            rule:
              type: array
              description: Networking rule
              items:
                type: object
                additionalProperties: false
                properties:
                  rule_name:
                    description: name of network rule
                    type: string
                  rule_type:
                    description: type of rule eg, LLDP-ANY,LLDP-CAP,LLDP-CHASSIS,LLDP-IPV4-MGMT
                    type: string
                    enum:
                      - LLDP-ANY
                      - LLDP-CAP
                      - LLDP-CHASSIS
                      - LLDP-IPV4-MGMT
                      - LLDP-PORT
                      - LLDP-PORT-DESC
                      - LLDP-SYS-DESC
                      - LLDP-SYS-NAME
                      - MAC-FULL
                      - MAC-LIST
                      - MAC-OUI
                      - MAC-RANGE
                      - DEFAULT
                  rule_device_data:
                    description: rule device type eg cnpilot,cnmatrix.
                    type: string
            actions:
              type: array
              description: Contains vlan actions
              items:
                type: object
                additionalProperties: false
                properties:
                  action_name:
                    description: name of action
                    type: string
                  native_vlan:
                    description: Enter comma separated or range of VLANs e.g., 10,12,14-20
                    type: string
                  auto_device_recovery:
                    description: enable/disable Automatic Device Recovery
                    type: string
                    enum:
                      - none
                      - enabled
                      - disabled
                  auto_voip:
                    description: Toggle the option to enable Auto-VoIP
                    type: string
                    enum:
                      - enabled
                      - disabled
                  selected_port_mode:
                    description: Switch Port Mode
                    type: string
                    enum:
                      - none
                      - access
                      - hybrid
                      - trunk
                  selected_qos_trust:
                    description: QoS Trust
                    type: string
                    enum:
                      - none
                      - dot1p
                      - untrusted
                  pba_action_vlan:
                    description: Enter comma separated or range of VLANs, e.g., 10,12,14-20
                    type: string
                  cambium_sync:
                    description: Cambium Sync
                    type: string
                    enum:
                      - none
                      - enabled
                      - disabled
