    vpn:
      type: object
      additionalProperties: false
      properties:
        radius_client_list:
          oneOf:
            - type: 'null'
            - type: array
              minItems: 1
              maxItems: 10
              items:
                type: object
                additionalProperties: false
                properties:
                  id:
                    type: number
                    minimum: 1
                    maximum: 10
                    description: Auto generated ID for each user
                  address:
                    description: Specify client network address
                    type: string
                    pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$
                  name:
                    description: Specify client name
                    type: string
                    minLength: 4
                    maxLength: 128
                    pattern: ^[\w\-]+$
                  netmask:
                    description: Specify client network prefix length
                    type: string
                    minimum: 8
                    maximum: 32
                  secret:
                    description: Specify secret for the client
                    type: string
                    minLength: 8
                    maxLength: 32
                required:
                  - id
                  - address
                  - name
                  - netmask
                  - secret
        radius_server_users:
          description: VPN user list. Max 200 for NSE 3000, max 1000 for NSE 4000.
          type: array
          default: []
          maxItems: 1000
          items:
            type: object
            additionalProperties: false
            properties:
              id:
                type: number
                minimum: 1
                maximum: 1000
                description: Auto generated ID for each user
              authenticator_otp:
                description: Specify google authenticator otp type
                type: string
                default: time-based
                enum:
                  - time-based
                  - counter-based
              authenticator_secret:
                description: Specify google authenticator secret
                type: string
              authenticator_window_size:
                description: Specify google authenticator window size
                type: string
                default: 21
              name:
                description: Specify user name
                type: string
                minLength: 1
                maxLength: 64
              password:
                description: Specify user password
                type: string
                minLength: 1
                maxLength: 64
              mfa:
                type: boolean
                default: false
              resend:
                type: boolean
                default: false
              otp_url:
                type: string
            required:
              - id
              - authenticator_otp
              - authenticator_secret
              - authenticator_window_size
              - name
              - password
        site_to_site:
          type: boolean
          default: false
        site_to_site_vpn:
          description: Site-to-site VPN tunnel list. Max 100 for NSE 3000, max 200 for NSE 4000.
          oneOf:
            - type: 'null'
            - type: array
              minItems: 1
              maxItems: 200
              items:
                type: object
                additionalProperties: false
                properties:
                  name:
                    type: string
                    minLength: 1
                    maxLength: 128
                  ike_version:
                    type: string
                    default: ikev2
                    enum:
                      - ikev1
                      - ikev2
                  role:
                    type: string
                    default: responder
                    enum:
                      - initiator
                      - responder
                  dead_peer_detection_interval:
                    type: string
                    default: 120
                    minimum: 30
                    maximum: 600
                    description: dead peer detection interval in seconds
                  remote_address:
                    type: string
                    description: <Public IP Address / Domain Name>
                    format: CNS_IP_OR_HOST
                  remote_id:
                    type: string
                    description: <ip_address / string>
                    pattern: ^([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])(\.([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]{0,61}[a-zA-Z0-9]))*$
                  local_id:
                    type: string
                    description: <ip_address / string>
                    pattern: ^([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])(\.([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]{0,61}[a-zA-Z0-9]))*$
                  local_subnets:
                    type: string
                    description: comma seperated list of subnets <e.g 192.168.100.0/24,192.168.50.0/24>
                    pattern: ^((([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2])),)*(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$
                  remote_subnets:
                    type: string
                    description: comma seperated list of subnets <e.g 192.168.100.0/24,192.168.50.0/24
                    pattern: ^((([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2])),)*(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$
                  remote_psk:
                    type: string
                    minLength: 4
                    maxLength: 32
                  local_psk:
                    type: string
                    minLength: 4
                    maxLength: 32
                  ike_phase_1_encryption:
                    type: string
                    description: comma seperated list of algorithms. Combination of <aes128,aes192,aes256,aes128-gcm16,aes192-gcm16,aes256-gcm16,3des>
                  ike_phase_2_encryption:
                    type: string
                    description: comma seperated list of algorithms. Combination of <aes128,aes192,aes256,aes128-gcm16,aes192-gcm16,aes256-gcm16,3des>
                  ike_phase_1_integrity:
                    type: string
                    description: comma seperated list of algorithms. Combination of <md5,sha1,sha256>
                  ike_phase_2_integrity:
                    type: string
                    description: comma seperated list of algorithms. Combination of <md5,sha1,sha256>
                  ike_phase_1_dh_group:
                    type: string
                    default: '15'
                    enum:
                      - '1'
                      - '2'
                      - '5'
                      - '14'
                      - '15'
                  ike_phase_2_dh_group:
                    type: string
                    default: '15'
                    enum:
                      - '1'
                      - '2'
                      - '5'
                      - '14'
                      - '15'
                      - disabled
                  ike_phase_1_key_lifetime:
                    type: string
                    default: 4
                    minimum: 1
                    maximum: 24
                    description: key-lifetime in hours
                  ike_phase_2_key_lifetime:
                    type: string
                    default: 4
                    minimum: 1
                    maximum: 24
                    description: key-lifetime in hours
        l2tp_client_vpn:
          type: boolean
          default: false
        vpn_server_address_range:
          description: Specify IP address range
          type: string
        vpn_server_mfa:
          description: Enable two factor authentication via google authenticator
          type: string
          default: 'false'
          enum:
