              schema:
                $ref: '#/components/schemas/devices.yaml#device.action'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '422':
          description: Request params are malformed
        5XX:
          description: Unexpected error
    post:
      tags:
        - Devices
      summary: Initiate device ping.
      description: |
        The PING Test uses HTTP POST to start the test and HTTP GET to retrieve the results. The MAC address of the device running the test.
      parameters:
