    flow_policy_filter:
      type: object
      additionalProperties: false
      properties:
        id:
          type: number
          minimum: 1
          maximum: 150
        desc:
          type: string
          maxLength: 64
        action:
          type: string
          enum:
            - permit
            - deny
          default: permit
        type:
          type: string
          default: layer3-filter
          enum:
            - layer3-filter
            - layer7-filter
        proto:
          type: string
          enum:
            - tcp
            - udp
            - icmp
            - any
          default: any
        sport:
          type: string
          default: any
          pattern: ^[0-9]+$|^any$
          minimum: 1
          maximum: 65535
        src:
          type: string
          pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$|^any$
        src_mask:
          type: string
        dest:
          type: string
          pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$|^any$
        dest_mask:
          type: string
          pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$|^any$
        dport:
          type: string
          pattern: ^[0-9]+$|^any$
          minimum: 1
          maximum: 65535
          default: any
        dpi-app-name:
          description: Application id for flow preferences and failover policy
          anyOf:
            - $ref: '#/components/schemas/legacy_applications-2'
            - $ref: '#/components/schemas/flow_policy_applications'
            - type: string
              minLength: 1
              maxLength: 30
              description: custom apps
        dpi-cat-name:
          type: string
          enum:
            - social
            - message
            - web_srvc
            - stream
            - mail
            - filexfer
            - network
            - games
            - other
            - vpn_tun
            - remote
            - monitor
            - collab
            - proxy
            - database
        dpi-config-type:
          type: string
          enum:
            - application
            - category
            - application_group
        application-group:
          type: string
          description: application group name
        user-group:
          type: string
          description: user group name
        ip-address:
          type: string
          pattern: ^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)(?:\/(?:3[0-2]|[12]?[0-9]))?$
          description: IP address or subnet
        allow_all_sources:
          type: boolean
          default: true
    wan:
      type: object
      additionalProperties: false
      properties:
        wan_interfaces:
          description: WAN interface list. Min 2 for both models. Max 4 for NSE 3000, max 5 for NSE 4000.
          type: array
          minItems: 2
          maxItems: 5
          items:
            type: object
            additionalProperties: false
            required:
              - lan_interface
            properties:
              name:
                type: string
                readOnly: true
                enum:
                  - wan1
                  - wan2
                  - wan3
                  - wan4
                  - wan5
                description: Name of the wan interface
              lan_interface:
                description: Physical port assigned to this WAN. NSE 3000 supports eth1-eth6, NSE 4000 supports eth1-eth10. The same port cannot be assigned to both WAN and LAN.
                type: string
                enum:
                  - eth1
                  - eth2
                  - eth3
                  - eth4
                  - eth5
                  - eth6
                  - eth7
                  - eth8
                  - eth9
                  - eth10
              dyndns_config:
                type: object
                additionalProperties: false
                properties:
                  dyndns_mode:
                    type: string
                    default: disable
                    enum:
                      - enable
                      - disable
                  provider:
                    type: string
                    description: Name of DNS Provider (example. noip)
                    default: noip
                    enum:
                      - cloudflare
                      - godaddy
                      - hetzner
                      - namecheap
                      - noip
                      - route53
                      - porkbun
                      - dyn
                      - ddns2compliant
                  dnshostname:
                    type: string
                    description: Specify DNS host name
                    maxLength: 256
                  username:
                    type: string
                    description: User name for account registered with the DNS provider
                    maxLength: 256
                  password:
                    type: string
                    description: Password for the user registered with the DNS provider
                    maxLength: 256
                  key_id:
                    type: string
                    maxLength: 256
                  zone:
                    type: string
                    maxLength: 256
                  api_secret:
                    type: string
                    maxLength: 256
                  server_name:
                    type: string
                    maxLength: 256
              ip_mode:
                type: string
                default: dynamic
                enum:
                  - static
                  - dynamic
                  - pppoe
              ip_addr:
                type: string
                oneOf:
                  - pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$
                  - enum:
                      - ''
              subnet_mask:
                type: string
                oneOf:
                  - format: CNS_SUBNET_MASK
                  - enum:
                      - ''
              additional_ip_addrs:
                type: string
                description: ip-address(192.168.1.1), ip-address/prefix(192.168.1.0/24) or ip-address range(192.168.1.1-192.168.1.20)
              starlink_enable:
                type: boolean
                default: false
              starlink_dish_ip:
                type: string
                default: 192.168.100.1
                oneOf:
                  - pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$
                  - enum:
                      - ''
              starlink_dish_port:
                type: string
                minimum: 1
                maximum: 65535
                default: 9200
              starlink_dish_mode:
                type: string
                default: bridge
                enum:
                  - bridge
                  - router
              starlink_dish_grpc_reflection_ip:
                type: string
                default: 192.168.1.1
                oneOf:
                  - pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$
                  - enum:
                      - ''
              starlink_dish_grpc_reflection_port:
                type: string
                minimum: 1
                maximum: 65535
                default: 9000
              cellular_enable:
                type: boolean
                description: Enable/disable cellular WAN
                default: false
              cellular_wan_user:
                type: string
                description: Username for cellular WAN router
                maxLength: 256
              cellular_wan_password:
                type: string
                description: Password for cellular WAN router
                maxLength: 256
              load_balance_config:
                type: object
                additionalProperties: false
                properties:
                  lb_mode:
                    type: string
                    default: disabled
                    enum:
                      - shared
                      - backup
                      - disabled
                  lb_backup-link-priority:
                    type: string
                    default: 1
                    minimum: 0
                    maximum: 10
                    description: Configure priority (0-highest prio; 10-lowest prio) for this link. Applicable only for backup links
                  lb_monitor-hosts:
                    type: array
                    default:
                      - 8.8.8.8
                    items:
                      type: string
                      minLength: 1
                      maxLength: 64
                      format: CNS_IP_OR_HOST
                      description: Configure IP addresses/Hostnames to monitor with ping for link health. Max 5 entries
                  lb_num-hosts-fail-interface-down:
                    oneOf:
                      - type: 'null'
                      - type: string
                        minimum: 0
                        maximum: 5
                        default: 1
                        description: Configure the number of monitor hosts to fail to declare interface down (Default - 1)
                  lb_ping-failure-detect-time:
                    oneOf:
                      - type: 'null'
                      - type: string
                        minimum: 5
                        maximum: 60
                        default: 5
                        description: Configure interval for declaring link DOWN (5 - 60) seconds
                  lb_ping-interval:
                    oneOf:
                      - type: 'null'
                      - type: string
                        minimum: 2
                        maximum: 10
                        default: 2
                        description: Configure interval at which hosts should be pinged (2 - 10) seconds
                  lb_ping-timeout:
                    oneOf:
                      - type: 'null'
                      - type: string
                        minimum: 1
                        maximum: 10
                        default: 2
                        description: Configure timeout for ping (1 - 10) seconds
                  lb_traffic-share-percentage:
                    type: string
                    minimum: 5
                    maximum: 100
                    default: 100
                    description: Specify Share Link Load Percentage (0-100)
              source_nat:
                type: string
                enum:
                  - enable
                  - disable
                default: enable
              snat_rules:
                type: array
                default: []
                maxItems: 16
                items:
                  type: object
                  required:
                    - name
                  additionalProperties: false
                  properties:
                    id:
                      type: integer
                      minimum: 1
                      maximum: 150
                    name:
                      type: string
                      maxLength: 64
                    lan_ip:
                      type: string
                      description: ip_address | ip_address/mask
                      pattern: ^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)(?:\/(?:3[0-2]|[12]?[0-9]))?$
                    lan_ip_group:
                      type: string
                      description: ip group name
                    lan_ip_all:
                      type: boolean
                    public_ip:
                      type: string
                      description: ip_address | ip_address/mask | ip_range
              default_gateway:
                type: string
                oneOf:
                  - pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$
                  - enum:
                      - ''
              bandwidth_config:
                type: object
                additionalProperties: false
                properties:
                  uplink_bandwidth:
                    type: string
                    minimum: 1
                    maximum: 10000
                    default: 1000
                    description: Uplink traffic limit in Mbps. NSE 3000 max = 1000. NSE 4000 max = 10000 (SFP ports eth1/eth2) or 2500 (RJ45 ports eth3-eth10).
                  downlink_bandwidth:
                    type: string
                    minimum: 1
                    maximum: 10000
                    default: 1000
                    description: Downlink traffic limit in Mbps. NSE 3000 max = 1000. NSE 4000 max = 10000 (SFP ports eth1/eth2) or 2500 (RJ45 ports eth3-eth10).
              traffic_shaping:
                type: string
                enum:
                  - enable
                  - disable
                default: disable
              traffic_shaping_rules:
                type: array
                items:
                  type: object
                  required:
                    - name
                  additionalProperties: false
                  properties:
                    filter_rule:
                      allOf:
                        - $ref: '#/components/schemas/filter'
                        - type: object
                          required:
                            - id
                            - type
                    name:
                      type: string
                      maxLength: 64
                      pattern: ^[a-zA-Z][\w\-]+$
                    shaping_uplink_limit:
                      type: string
                      minimum: 1
                      maximum: 10000
                      description: Traffic shaping uplink limit in Mbps. NSE 3000 max = 1000. NSE 4000 max = 10000 (SFP ports eth1/eth2) or 2500 (RJ45 ports eth3-eth10).
                    shaping_downlink_limit:
                      type: string
                      minimum: 1
                      maximum: 10000
                      description: Traffic shaping downlink limit in Mbps. NSE 3000 max = 1000. NSE 4000 max = 10000 (SFP ports eth1/eth2) or 2500 (RJ45 ports eth3-eth10).
                    desc:
                      oneOf:
                        - type: 'null'
                        - type: string
                          maxLength: 64
                    dscp:
                      type: string
                      minimum: 0
                      maximum: 63
                      description: Dscp for the matching rule
              speedtest:
                type: boolean
                default: false
                description: Enable/disable speedtest reporting
                enum:
                  - true
                  - false
              vlan:
                type: string
                minimum: 1
                maximum: 4094
              pppoe_server:
                type: object
                additionalProperties: false
                properties:
                  ac_name:
                    type: string
                    maxLength: 32
                  mtu:
                    type: integer
                    minimum: 500
                    maximum: 1492
                    default: 1492
                  password:
                    type: string
                    maxLength: 64
                  service_name:
                    type: string
                    maxLength: 32
                  mss_clamp:
                    type: string
                    default: 'true'
                    enum:
                      - 'true'
                      - 'false'
                  user:
                    anyOf:
                      - type: string
                        pattern: ^[\w\-\.@]*$
                        maxLength: 64
                      - type: string
                        enum:
                          - ''
              name_server:
                type: array
                minItems: 1
                maxItems: 2
                items:
                  type: string
                  oneOf:
                    - pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$
                    - enum:
                        - ''
              failover_policy_state:
                type: boolean
                default: false
              failover_policy:
                type: array
                default: []
                items:
                  type: object
                  required:
                    - name
                  additionalProperties: false
                  properties:
                    desc:
                      oneOf:
                        - type: 'null'
                        - type: string
                          maxLength: 64
                    name:
                      type: string
                      maxLength: 64
                      pattern: ^[a-zA-Z][\w\-]+$
                    filter_rule:
                      $ref: '#/components/schemas/flow_policy_filter'
                      description: L3/L7 filter rule
        flow_preferences:
          type: array
          items:
            type: object
            required:
              - name
            additionalProperties: false
            properties:
              desc:
                oneOf:
                  - type: 'null'
                  - type: string
                    maxLength: 64
              filter_rule:
                $ref: '#/components/schemas/flow_policy_filter'
              policy:
                type: string
                enum:
                  - flexible
                  - strict
                default: flexible
              name:
                type: string
                maxLength: 64
                pattern: ^[a-zA-Z][\w\-]+$
              interface_name:
                type: string
                enum:
                  - wan1
                  - wan2
    firewall:
      type: object
      additionalProperties: false
      properties:
        stateful_firewall:
          type: boolean
          default: true
        filter_config:
          description: 'Firewall filter configuration list. Max filter rules: 150 for NSE 3000, 500 for NSE 4000. Individual filter_rule IDs must be within 1-150 for NSE 3000 and 1-500 for NSE 4000.'
          type: array
          default: []
          items:
            type: object
            required:
              - name
            additionalProperties: false
            properties:
              desc:
                oneOf:
                  - type: 'null'
                  - type: string
                    maxLength: 64
              name:
                type: string
                maxLength: 64
                pattern: ^[a-zA-Z][\w\-]+$
              filter_rule:
                $ref: '#/components/schemas/filter'
        nat_one_one:
          type: array
          default: []
          minItems: 0
          maxItems: 16
          items:
            type: object
            additionalProperties: false
            properties:
