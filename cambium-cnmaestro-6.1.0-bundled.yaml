    ap_group_body:
      type: object
      additionalProperties: false
      properties:
        auto_sync:
          type: boolean
          default: true
          description: Indicates if changes made to the AP Group or linked WLANs should automatically be applied to devices.  Defaults to true.
        basic:
          type: object
          additionalProperties: false
          properties:
            country_code:
              $ref: '#/components/schemas/country_code'
            system_location:
              description: Location where this device is placed (max 64 characters)
              default: ''
              type: string
              maxLength: 64
              pattern: ^((?!\$\{).)*$
            system_contact:
              description: Contact information for the device (max 64 characters)
              default: ''
              type: string
              maxLength: 64
            led:
              description: Whether the device LEDs should be ON during operation
              default: true
              type: boolean
            lldp:
              description: Whether the AP should transmit LLDP packets
              default: true
              type: boolean
            poe_out:
              description: Enable Power over Ethernet to an auxiliary device connected to eth2
              default: disabled
              type: string
              enum:
                - disabled
                - cambium-poe
                - 8023af
            placement:
              description: Configure the AP placement details
              default: indoor
              type: string
              enum:
                - indoor
                - outdoor
            channel_distribution_enabled:
              description: Enable/disable channel distribution
              default: true
              type: boolean
        description:
          description: Description of this AP Group.
          default: null
          type:
            - string
            - 'null'
        dhcp:
          description: DHCP Pool
          type: array
          items:
            type: object
            additionalProperties: false
            required:
              - id
              - start_address
              - end_address
              - default_router
              - network_ip
              - network_mask
            properties:
              bind_list:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  required:
                    - ip
                    - mac
                  properties:
                    ip:
                      description: IP Address
                      type: string
                      format: CNS_IPv4
                    mac:
                      description: MAC Address
                      type: string
                      format: CNS_HYP_MAC
              default_router:
                description: Default router
                type: string
                format: CNS_IPv4
              domain_name:
                description: Domain name
                type: string
              end_address:
                description: End of the IP address range to be assigned to clients
                type: string
                format: CNS_IPv4
              id:
                description: Pool Number
                type: integer
                minimum: 1
                maximum: 16
              lease_time:
                description: Lease in the format "1d:2h:3m"
                type: string
              network_ip:
                description: Subnet number of the DHCP address pool
                type: string
                format: CNS_IPv4
              network_mask:
                description: Subnet mask of the DHCP address pool
                type: string
                format: CNS_IPv4
              primary_dns_server:
                description: Primary DNS address
                type: string
                format: CNS_IPv4
              secondary_dns_server:
                description: Secondary DNS address
                type: string
                format: CNS_IPv4
              start_address:
                description: Start of the IP address range to be assigned to clients
                type: string
                format: CNS_IPv4
        ethernet_ports:
          type: object
          additionalProperties: false
          properties:
            interface_eth1_shutdown:
              description: Enable/ Disable Ethernet 1 Port
              default: false
              type: boolean
            interface_eth1_mode:
              description: Access Single VLAN or Trunk Multiple VLANs
              default: access
              type: string
              enum:
                - access
                - trunk
            interface_eth1_access_vlan:
              description: VLAN ID should be in between 1 and 4094
              default: 1
              type: integer
              minimum: 1
              maximum: 4094
            interface_eth1_allowed_vlan:
              description: 'Allowed VLANs. Eg: 1-3 or 4,10,22'
              $ref: '#/components/schemas/comma_range_or_empty_string'
            interface_eth1_tag_native:
              type: boolean
            interface_eth1_native_vlan:
              description: VLAN ID should be between 1 and 4094
              type: integer
              minimum: 1
              maximum: 4094
            interface_eth1_enable_lacp:
              description: Enable LACP on Ethernet Port 1
              type: boolean
              enum:
                - true
            interface_eth1_lacp_mode:
              description: Access Single VLAN or Trunk Multiple VLANs
              default: access
              type: string
              enum:
                - access
                - trunk
            interface_eth1_lacp_access_vlan:
              description: VLAN ID should be in between 1 and 4094
              default: 1
              type: integer
              minimum: 1
              maximum: 4094
            interface_eth1_lacp_allowed_vlan:
              description: 'Allowed VLANs. Eg: 1-3 or 4,10,22'
              $ref: '#/components/schemas/comma_range_or_empty_string'
            interface_eth1_lacp_tag_native:
              type: boolean
            interface_eth1_lacp_native_vlan:
              description: VLAN ID should be between 1 and 4094
              type: integer
              minimum: 1
              maximum: 4094
            interface_eth1_acl_rule:
              description: Access Control List
              type: array
              items:
                type: object
                additionalProperties: false
                properties:
                  action:
                    description: Permit, deny or route the policy
                    type: string
                    enum:
                      - permit
                      - deny
                      - route
                  dip:
                    description: Destination IP
                    type: string
                    oneOf:
                      - format: CNS_IPv6
                      - format: CNS_IPv4
                      - enum:
                          - any
                  dip_mask:
                    description: Destination IP Mask
                    oneOf:
                      - type: string
                        format: CNS_IPv4
                      - type: integer
                        minimum: 0
                        maximum: 128
                      - type: string
                        enum:
                          - any
                  dir:
                    description: Direction
                    type: string
                    enum:
                      - in
                      - out
                      - any
                  dmac:
                    description: Destination MAC address
                    anyOf:
                      - type: string
                        format: CNS_HYP_MAC
                      - type: string
                        enum:
                          - any
                  dmac_mask:
                    description: Destination MAC address mask. "FF-FF-FF-00-00-00" for any.
                    type: string
                    format: CNS_HYP_MAC
                  dport:
                    description: Destination Port
                    anyOf:
                      - type: integer
                        minimum: 0
                        maximum: 65535
                      - type: string
                        enum:
                          - any
                  precedence:
                    type: integer
                    minimum: 0
                    maximum: 255
                  protocol:
                    $ref: '#/components/schemas/acl_protocol'
                  sip:
                    description: Source IP
                    type: string
                    oneOf:
                      - format: CNS_IPv6
                      - format: CNS_IPv4
                      - enum:
                          - any
                  sip_mask:
                    description: Source IP Mask
