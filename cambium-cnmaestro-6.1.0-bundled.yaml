        managed_account:
          description: Managed account ID of the Access Control being created/edited
          type: string
        name:
          type: string
          description: Unique name of the access control policy
          minLength: 3
          maxLength: 25
        air_cleaner_enabled:
          type: boolean
          default: false
          description: Set of filtering rules, to be applied on AP Group only.
        acp_type:
          type: string
          description: Type of access control policy
          enum:
            - ap_group
        shared:
          type: boolean
          default: false
          description: Indicates if this ACP should be sharable with managed accounts. Only applicable for Base Infrastructure ACP.  Defaults to false. Only supported for POST requests.
