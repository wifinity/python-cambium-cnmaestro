      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/body-23'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/devices.yaml#device.action'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '422':
