        wg_server_network:
          type: string
          pattern: ^((25[0-5]|2[0-4][0-9]|[0-1]?[0-9][0-9]?)\.){3}(25[0-5]|2[0-4][0-9]|[0-1]?[0-9][0-9]?)\/(3[0-2]|[1-2]?[0-9])$
        wg_rw_vpn_server_listen_port:
          type: string
          maximum: 65535
