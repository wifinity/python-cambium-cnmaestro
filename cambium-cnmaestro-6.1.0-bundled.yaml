    ap_group_acp:
      type: object
      additionalProperties: false
      properties:
        mac_rules:
          type: array
          description: Contains the set of MAC rules to be applied to the linked AP Group
          items:
            type: object
            additionalProperties: false
            properties:
              name:
                description: name of rule
                type: string
              enabled:
                description: enable the rule or not
                type: boolean
              action:
                description: action required
                type: string
                enum:
                  - permit
                  - deny
              direction:
                description: direction of rule
                type: string
                enum:
                  - in
                  - out
                  - any
              proto:
                description: protcol of rule
                type: string
                enum:
                  - tcp
                  - udp
                  - arp
                  - any
                  - icmp
                  - igmp
                  - srp
                  - sctp
              dport:
                description: destination port, can be single value or a range ex 67 or "67:476"
                anyOf:
                  - type: string
                    $ref: '#/components/schemas/colon_range'
                  - type: string
                    enum:
                      - any
              sport:
                description: source port, can be single value or a range ex 67 or "67:476"
                anyOf:
                  - type: string
                    $ref: '#/components/schemas/colon_range'
                  - type: string
                    enum:
                      - any
              type:
                description: type of rule
                type: string
                enum:
                  - layer2-filter
                  - layer3-filter
                  - layer7-filter
              src_mac:
                description: source MAC
                anyOf:
                  - type: string
                    format: CNS_MAC
                  - type: string
                    enum:
                      - any
              src_mac_mask:
                description: source MAC mask
                anyOf:
                  - type: string
                    format: CNS_MAC
                  - type: string
                    enum:
                      - any
              dest_mac:
                description: destination MAC
                anyOf:
                  - type: string
                    format: CNS_MAC
                  - type: string
                    enum:
                      - any
                      - multicast
              dest_mac_mask:
                description: destination MAC mask
                anyOf:
                  - type: string
                    format: CNS_MAC
                  - type: string
                    enum:
                      - any
              rule_type:
                description: type of rule
                type: string
                enum:
                  - ip
                  - proto
                  - mac
              wlan_to_wlan:
                description: wlan to wlan enable or not
                type: boolean
        ip_app_rules:
          type: array
          description: Contains the set of ip app rules to be applied to the linked AP Group
          items:
            type: object
            additionalProperties: false
            properties:
              name:
                description: name of rule
                type: string
              enabled:
                description: enable the rule or not
                type: boolean
              action:
                description: action required
                type: string
                enum:
                  - permit
                  - deny
              direction:
                description: direction of rule
                type: string
                enum:
                  - in
                  - out
                  - any
              proto:
                description: protcol of rule
                type: string
                enum:
                  - tcp
                  - udp
                  - arp
                  - any
                  - icmp
                  - igmp
                  - srp
                  - sctp
              dport:
                description: destination port, can be single value or a range ex 67 or "67:476"
                anyOf:
                  - type: string
                    $ref: '#/components/schemas/colon_range'
                  - type: string
                    enum:
                      - any
              sport:
                description: source port, can be single value or a range ex 67 or "67:476"
                anyOf:
                  - type: string
                    $ref: '#/components/schemas/colon_range'
                  - type: string
                    enum:
                      - any
              type:
                description: type of rule
                type: string
                enum:
                  - layer3-filter
                  - layer7-filter
              src:
                description: source IP
                type: string
              src_mask:
                description: source IP mask
                type: string
              dest:
                description: destination IP
                anyOf:
                  - type: string
                    format: CNS_IPv4
                  - type: string
                    format: CNS_IPv6
                  - type: string
                    enum:
                      - any
                      - multicast
              dest_mask:
                description: destination IP mask
                type: string
              rule_type:
                description: type of rule
                type: string
                enum:
                  - ip
                  - proto
                  - mac
              config_type:
                description: type of config for application filtering
                type: string
                enum:
                  - category
                  - application
              category:
                description: category of application
                type: string
                enum:
                  - social
                  - collab
                  - database
                  - filexfer
                  - games
                  - mail
                  - message
                  - monitor
                  - network
                  - proxy
                  - remote
                  - stream
                  - other
                  - vpn_tun
                  - web_srvc
              application:
                description: application id
                anyOf:
                  - $ref: '#/components/schemas/legacy_applications'
                  - $ref: '#/components/schemas/new_applications'
                  - type: string
                    minLength: 1
                    maxLength: 30
                    description: custom apps
              dscp:
                description: dscp value ranging from 0 to 63
                type: integer
                minimum: 0
                maximum: 63
              qos:
                description: qos value ranging from 0 to 3
                type: integer
                minimum: 0
                maximum: 3
              traffic_limit_type:
                description: Traffic limit type
                type: string
                enum:
                  - ''
                  - ap
                  - client
              traffic_limit_unit:
                description: Unit of traffic limit, e.g. mbps, pps, kbps
                type: string
                enum:
                  - mbps
                  - pps
                  - kbps
              wlan_to_wlan:
                description: WLAN to WLAN enable or not
                type: boolean
              traffic_limit_value:
                description: Traffic limit value, based on traffic_limit_unit
                type: integer
              schedule_days:
                description: Days on which you want to schedule it.
                anyOf:
                  - type: array
                    items:
                      description: Days of the weeks.
                      type: string
                      enum:
                        - Mon
                        - Tue
                        - Wed
                        - Thu
                        - Fri
                        - Sat
                        - Sun
                  - type: 'null'
              schedule_time:
                description: hyphen separated schedule time, HH:MM-HH:MM
                anyOf:
                  - type: string
                    pattern: ^(0[0-9]|1[0-9]|2[0-3]):[0-5][0-9]-(0[0-9]|1[0-9]|2[0-3]):[0-5][0-9]$
                  - type: 'null'
