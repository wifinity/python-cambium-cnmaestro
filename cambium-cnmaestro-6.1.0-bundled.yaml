  /events:
    get:
      tags:
        - Events
      summary: Returns list of events.
      description: |-
        Retrieve event log from all managed accounts including Base infrastructure.

        **Pagination Methods**:

        This API supports two pagination methods: **offset-based** (deprecated) and **continuation token-based** (recommended).

        **a. Offset-Based Pagination (Deprecated)**:

        The `offset` parameter is deprecated and will be removed in release 6.1.0. Please use continuation token-based pagination instead.

        When using offset-based pagination, the response includes:
        - `offset`: Current offset value
        - `limit`: Maximum number of items per page
        - `total`: Total number of items available

        **Example**: First request with `offset=0&limit=100` will return:
        ```json
        {
          "paging": {
            "offset": 0,
            "limit": 100,
            "total": 500
          },
          "data": [...]
        }
        ```

        **b. Continuation Token-Based Pagination (Recommended)**:

        This is the recommended approach for pagination.

        **Initial Request**:

        Send your first request without `continuation_token` and without `offset` parameters.

        In release 6.0.0, the response will include (for backward compatibility):
        - `offset`: Current offset value
        - `limit`: Maximum number of items per page
        - `total`: Total number of items available
        - `next_continuation_token`: Token to use for the next page

        > **Note**: `offset` and `total` fields will be completely removed in the 6.1.0 release.

        **Subsequent Requests**:

        Use the `next_continuation_token` from the previous response as the `continuation_token` parameter.

        When using continuation token-based pagination, the response will include:
        - `limit`: Maximum number of items per page
        - `next_continuation_token`: Token for the next page (if more results exist)

        Continue using `continuation_token` until `next_continuation_token` is not present in the response.

        **Example Workflow**:

        1. **First request**: `GET /api/v2/events?start_time=2024-01-01T00:00:00Z&stop_time=2024-01-02T00:00:00Z&limit=100`

           **Response**:
           ```json
           {
             "paging": {
               "offset": 0,
               "limit": 100,
               "total": 500,
               "next_continuation_token": "abc123"
             },
             "data": [...]
           }
           ```

        2. **Second request**: `GET /api/v2/events?continuation_token=abc123`

           **Response**:
           ```json
           {
             "paging": {
               "limit": 100,
               "next_continuation_token": "def456"
             },
             "data": [...]
           }
           ```

        3. **Continue** until `next_continuation_token` is absent in the response.

        **Important Notes**:

        - Do not mix pagination methods. Once you start using `continuation_token`, do not use `offset` in subsequent requests.
        - The `offset` parameter will be removed in release 6.1.0. Migrate to continuation token-based pagination as soon as possible.
        - In current version, when using continuation token-based pagination, `offset` and `total` are only returned in the first response for backward compatibility. These fields will be completely removed in the 6.1.0 release.
      producers:
        - application/json
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset.deprecated'
        - $ref: '#/components/parameters/continuation_token.new'
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/msp'
        - $ref: '#/components/parameters/severity'
        - $ref: '#/components/parameters/network'
        - $ref: '#/components/parameters/tower'
        - $ref: '#/components/parameters/site'
        - $ref: '#/components/parameters/start_time'
        - $ref: '#/components/parameters/stop_time'
        - $ref: '#/components/parameters/code'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/notification'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '422':
          description: Request params are malformed
        5XX:
          description: Unexpected error
