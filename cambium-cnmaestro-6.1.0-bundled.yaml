        managed_account:
          description: Managed account ID of the NSE Group being created/edited.
          type: string
        shared:
          type: boolean
          default: false
          description: Indicates if this NSE Group should be sharable with managed accounts.  Only applicable for Base Infrastructure NSE Groups.  Defaults to false.  Only supported for POST requests.
        management:
          type: object
          $ref: '#/components/schemas/management'
        network:
          type: object
          $ref: '#/components/schemas/network'
        groups:
          type: object
          properties:
            ip_groups:
              oneOf:
                - type: 'null'
                - $ref: '#/components/schemas/ip_groups'
            user_groups:
              oneOf:
                - type: 'null'
                - $ref: '#/components/schemas/user_groups'
            application_groups:
              oneOf:
                - type: 'null'
                - $ref: '#/components/schemas/application_groups'
        wan:
