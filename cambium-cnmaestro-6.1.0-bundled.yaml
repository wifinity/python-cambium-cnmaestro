                      type: string
                      description: "PER (Packet Error Rate)-based channel switch trigger (on/off)."
                    auto_rf_per_threshold:
                      type: string
                      description: "PER threshold percentage to trigger Auto RF channel change."
                    auto_rf_channel_utilization_switch:
                      type: string
                      description: "Channel utilization-based switch trigger (on/off)."
                    auto_rf_channel_utilization_threshold:
                      type: string
                      description: "Channel utilization threshold percentage to trigger Auto RF."
                    auto_rf_noise_channel_switch:
                      type: string
                      description: "Noise-based channel switch trigger (on/off)."
                    auto_rf_noise_threshold:
                      type: string
                      description: "Noise floor threshold (dBm) to trigger Auto RF channel change."
