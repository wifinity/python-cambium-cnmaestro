    access_control.yaml#access_control: |
      access_control.list:
        type: object
        additionalProperties: false
        properties:
          paging:
            $ref: "../../common/paging.yaml#paging"
          data:
            type: array
            items:
              $ref: "#access_control.item"
        example:
          paging:
            offset: 0
            limit: 2
            total: 61
          data:
            - name: "ACP-1"
              acp_type: "ap_group"
              shared: false
              managed_account: ""
              air_cleaner_enabled: true
              mac_rules:
                - name: "rule1"
                  enabled: "true"
                  action: "permit"
                  direction: "in"
                  proto: "any"
                  sport: "any"
                  dport: "any"
                  type: "layer2-filter"
                  src_mac: "any"
                  src_mac_mask: "any"
                  dest_mac: "any"
                  dest_mac_mask: "any"
                  rule_type: "mac"
              air_cleaner_rules:
                - name: "Air-cleaner-Arp.1"
                  action: "deny"
                  direction: "in"
                  proto: "arp"
                  sport: "any"
                  dport: "any"
                  enabled: "true"
                  type: "layer2-filter"
                  src_mac: "any"
                  src_mac_mask: "FF:FF:FF:FF:FF:FF"
                  dest_mac: "any"
                  dest_mac_mask: "FF:FF:FF:FF:FF:FF"
                  rule_type: "proto"
                  wlan_to_wlan: "true"
            - name: "ACP-2"
              acp_type: "wlan"
              shared: false
              managed_account: ""
              air_cleaner_enabled: false
              ip_app_rules:
                - name: "rate-limit-mDNS"
                  enabled: "true"
                  action: "permit"
                  direction: "in"
                  proto: "udp"
                  sport: "any"
                  dport: "5353"
                  type: "layer3-filter"
                  src: "any"
                  src_mask: "any"
                  dest: "any"
                  dest_mask: "any"
                  rule_type: "proto"
                  limit: "20"
                  limit_type: "sta pps"

      access_control.item:
        type: object
        additionalProperties: false
        properties:
          name:
            type: string
            description: "Unique name of the Access Control Policy."
          acp_type:
            type: string
            description: "Type of ACP — ap_group applies to AP Groups, wlan applies to WLANs."
          shared:
            type: boolean
            description: "Whether this ACP is shared across accounts."
          managed_account:
            type: string
            description: "Managed account this ACP belongs to."
          air_cleaner_enabled:
            type: boolean
            description: "Whether the built-in Air Cleaner rules are active."
          mac_rules:
            type: array
            nullable: true
            description: "Layer 2 MAC-based firewall rules."
            items:
              type: object
              properties:
                name:
                  type: string
                  description: "Rule name."
                enabled:
                  type: string
                  description: "Whether the rule is enabled (true/false as string)."
                action:
                  type: string
                  description: "Rule action (permit/deny)."
                direction:
                  type: string
                  description: "Traffic direction this rule applies to (in/out/any)."
                proto:
                  type: string
                  description: "Layer 2/3 protocol (any/arp/udp/tcp/etc.)."
                sport:
                  type: string
                  description: "Source port (any or port number)."
                dport:
                  type: string
                  description: "Destination port (any or port number)."
                type:
                  type: string
                  description: "Rule filter type (layer2-filter)."
                src_mac:
                  type: string
                  description: "Source MAC address (any or specific MAC)."
                src_mac_mask:
                  type: string
                  description: "Source MAC address mask."
                dest_mac:
                  type: string
                  description: "Destination MAC address (any/broadcast/multicast or specific)."
                dest_mac_mask:
                  type: string
                  description: "Destination MAC address mask."
                rule_type:
                  type: string
                  description: "Rule match type (mac/proto)."
                wlan_to_wlan:
                  type: string
                  description: "Whether rule applies to intra-WLAN traffic (true/false as string)."
          ip_app_rules:
            type: array
            nullable: true
            description: "Layer 3 IP/application firewall rules."
            items:
              type: object
              properties:
                name:
                  type: string
                  description: "Rule name."
                enabled:
                  type: string
                  description: "Whether the rule is enabled (true/false as string)."
                action:
                  type: string
                  description: "Rule action (permit/deny)."
                direction:
                  type: string
                  description: "Traffic direction this rule applies to (in/out/any)."
                proto:
                  type: string
                  description: "IP protocol (any/udp/tcp/icmp/etc.)."
                sport:
                  type: string
                  description: "Source port (any or port number)."
                dport:
                  type: string
                  description: "Destination port (any or port number)."
                type:
                  type: string
                  description: "Rule filter type (layer3-filter)."
                src:
                  type: string
                  description: "Source IP address (any or specific IP)."
                src_mask:
                  type: string
                  description: "Source IP address mask."
                dest:
                  type: string
                  description: "Destination IP address (any or specific IP)."
                dest_mask:
                  type: string
                  description: "Destination IP address mask."
                rule_type:
                  type: string
                  description: "Rule match type (proto/app)."
                limit:
                  type: string
                  description: "Rate limit value."
                limit_type:
                  type: string
                  description: "Rate limit type (e.g., sta pps, sta bps)."
          air_cleaner_rules:
            type: array
            nullable: true
            description: "Auto-generated Air Cleaner rules for WLAN traffic management."
            items:
              type: object
              properties:
                name:
                  type: string
                  description: "Rule name."
                action:
                  type: string
                  description: "Rule action (permit/deny)."
                direction:
                  type: string
                  description: "Traffic direction (in/out/any)."
                proto:
                  type: string
                  description: "Protocol."
                sport:
                  type: string
                  description: "Source port."
                dport:
                  type: string
                  description: "Destination port."
                enabled:
                  type: string
                  description: "Whether the rule is enabled (true/false as string)."
                type:
                  type: string
                  description: "Filter type (layer2-filter)."
                src_mac:
                  type: string
                  description: "Source MAC address."
                src_mac_mask:
                  type: string
                  description: "Source MAC mask."
                dest_mac:
                  type: string
                  description: "Destination MAC address."
                dest_mac_mask:
                  type: string
                  description: "Destination MAC mask."
                rule_type:
                  type: string
                  description: "Rule match type."
                wlan_to_wlan:
                  type: string
                  description: "Whether rule applies to intra-WLAN traffic."
