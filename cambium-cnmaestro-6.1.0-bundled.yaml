      ap_group.item:
        type: object
        additionalProperties: false
        properties:
          name:
            type: string
            description: "Unique name of the AP Group."
          auto_sync:
            type: boolean
            description: "Whether configuration auto-sync to devices is enabled."
          description:
            type: string
            nullable: true
            description: "Description of the AP Group."
          edited_by:
            type: string
            description: "User who last edited the AP Group."
          last_edited:
            type: string
            description: "ISO 8601 timestamp of the last edit."
          managed_account:
            type: string
            description: "Managed account this AP Group belongs to."
          overrides:
            type: string
            nullable: true
            description: "Custom override configuration appended to device config."
          shared:
            type: boolean
            description: "Whether this AP Group is shared across accounts."
          wlans:
            type: array
            description: "List of WLAN names assigned to this AP Group."
            items:
              type: string
          basic:
            type: object
            description: "Basic AP settings."
            properties:
              country_code:
                type: string
                description: "Country code for regulatory compliance (e.g., us)."
              led:
                type: boolean
                description: "Whether LEDs are enabled on APs."
              lldp:
                type: boolean
                description: "Whether LLDP is enabled."
              channel_distribution_enabled:
                type: boolean
                description: "Whether automatic channel distribution is enabled."
              placement:
