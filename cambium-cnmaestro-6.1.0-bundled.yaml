        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/body-42'
            examples:
              default:
                summary: Assign/ Unassign WLAN
                value:
                  assign:
                    - name: WLAN_New
                  unassign:
                    - name: WLAN_Old
                  managed_account: ''
              onboarding:
                summary: Assign/ Unassign WLAN for onboarding portal
                value:
                  assign:
                    - name: WLAN_registration
                      type: registration
                    - name: WLAN_Network
                      type: network
                  unassign:
                    - name: WLAN_Old
                      type: registration
                    - name: WLAN_Old_Network
                      type: network
                  managed_account: ''
      responses:
        '200':
          description: OK
          content:
