          type: string
    nse_group_body:
      type: object
      additionalProperties: false
      properties:
        auto_sync:
          type: boolean
          default: true
          description: Indicates if changes made to the NSE Group should automatically be applied to devices.  Defaults to true.
        name:
          description: Unique name of this NSE Group(Maximum number of characters allowed is 64).
          type: string
          maxLength: 64
        nse_model:
          description: Hardware model of the NSE device. '3K' maps to Lima, '4K' maps to Oslo. Determines validation limits for WAN count, bandwidth, firewall rules, VPN tunnels, VPN users, VLANs, etc. Defaults to '3K' if not specified. Only supported for POST requests.
