openapi: 3.0.0
info:
  title: cnMaestro RESTful API
  description: |
    cnMaestro supports a RESTful API, allowing customers to read data and perform operations programmatically using their client applications.
    The API is supported over HTTPS, and messages are exchanged in JSON format.
    Modern programming languages have rich support for RESTful interfaces.

    cnMaestro API leverages OAuth 2.0 Client Credentials Grant. The Client Credentials grant type is used by clients to obtain an access token [Read More](/api/6.1.0/summary.html)

    [Announcements: New APIs / Deprecation notice](/api/6.1.0/announcements.html)
  version: 6.1.0
servers:
  - url: /api/v2
security:
  - oAuth: []
tags:
  - name: 60 GHz cnWave
    description: 60 GHz cnWave related APIs
  - name: Access Control
    description: cnPilot Enterprise Access Control Policy related APIs
  - name: Alarms
    description: Alarms related APIs
  - name: AP Groups
    description: cnPilot Enterprise AP Group related APIs
  - name: Association ACL
    description: Association Access Control List related APIs
  - name: cnArcher
    description: cnArcher related APIs
  - name: Configuration
    description: Configuration-related APIs
  - name: Devices
    description: Devices related APIs
  - name: EasyPass
    description: EasyPass related APIs
  - name: Events
    description: Events related APIs
  - name: Guest-Access
    description: cnPilot Enterprise Guest Access Portal related APIs
  - name: Installation Summary
    description: Device Installation Summary related APIs
  - name: Jobs
    description: Software/Configuration Jobs related APIs
  - name: Market Apps
    description: Market Apps related APIs
  - name: MSP
    description: Managed Service Provider related APIs
  - name: NSE Groups
    description: NSE Group related APIs
  - name: Networks
    description: Networks related APIs
  - name: Performance
    description: Device performance related APIs
  - name: Reports
    description: Report generation and management related APIs
  - name: Security
    description: Security related APIs (Supported only on cloud)
  - name: Sessions
    description: User sessions related APIs
  - name: Sites
    description: Sites related APIs
  - name: Statistics
    description: Device statistics related APIs
  - name: Switch Groups
    description: Switch Group and Switch ports related APIs
  - name: Towers
    description: Towers related APIs
  - name: WLANs
    description: cnPilot Enterprise WLAN and ePSK related APIs
  - name: Wi-Fi
    description: Wi-Fi related APIs
paths:
  /cnarcher/installation/summary:
    get:
      tags:
        - cnArcher
      summary: Returns list of SM Installation Summary (PMP, ePMP).
      description: Retrieve the details of all SM's cnArcher installation summary.
      producers:
        - application/json
      parameters:
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/msp'
        - $ref: '#/components/parameters/start_time'
        - $ref: '#/components/parameters/stop_time'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: OK
          content:
            application/json:
              examples:
                pmp-summary:
                  $ref: '#/components/examples/pmp'
                epmp-summary:
                  $ref: '#/components/examples/epmp'
              schema:
                $ref: '#/components/schemas/schema'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '422':
          description: Request params are malformed
        5XX:
          description: Unexpected error
  /cnarcher/installation/summary/{mac}:
    get:
      tags:
        - cnArcher
      summary: Returns mentioned SM Installation Summary (PMP, ePMP).
      description: Retrieve the details of mentioned SM's cnArcher installation summary.
      producers:
        - application/json
      parameters:
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/msp'
        - $ref: '#/components/parameters/sm_mac'
        - $ref: '#/components/parameters/start_time'
        - $ref: '#/components/parameters/stop_time'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: OK
          content:
            application/json:
              examples:
                pmp-summary:
                  $ref: '#/components/examples/pmp'
                epmp-summary:
                  $ref: '#/components/examples/epmp'
              schema:
                $ref: '#/components/schemas/schema'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '422':
          description: Request params are malformed
        5XX:
          description: Unexpected error
  /installation/summary:
    get:
      tags:
        - Installation Summary
      summary: Returns list of Installation Summary across all app types.
      description: |
        Retrieve installation summary details for all supported app types (cnArcher, enterprise-installer, etc.) under a site or tower.
        Optionally filter by specific app type using the type query parameter.
      producers:
        - application/json
      parameters:
        - $ref: '#/components/parameters/network'
        - $ref: '#/components/parameters/tower'
        - $ref: '#/components/parameters/site'
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/msp'
        - $ref: '#/components/parameters/start_time'
        - $ref: '#/components/parameters/stop_time'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - name: type
          in: query
          description: Filter by installation app type
          required: true
          schema:
            type: string
            enum:
              - cnArcher
              - enterprise-installer
          example: cnArcher
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallationSummaryResponse'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - feature not available for account type
        '404':
          description: Not Found
        '422':
          description: Request params are malformed
        5XX:
          description: Unexpected error
  /installation/summary/{mac}:
    get:
      tags:
        - Installation Summary
      summary: Returns Installation Summary for specific device MAC.
      description: |
        Retrieve installation summary details for a specific device across all supported app types.
        Optionally filter by specific app type using the type query parameter.
      producers:
        - application/json
      parameters:
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/msp'
        - $ref: '#/components/parameters/mac'
        - $ref: '#/components/parameters/start_time'
        - $ref: '#/components/parameters/stop_time'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - name: type
          in: query
          description: Filter by installation app type
          required: true
          schema:
            type: string
            enum:
              - cnArcher
              - enterprise-installer
          example: cnArcher
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallationSummaryResponse'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - feature not available for account type
        '404':
          description: Not Found
        '422':
          description: Request params are malformed
        5XX:
          description: Unexpected error
  /devices:
    get:
      tags:
        - Devices
      summary: Returns list of devices.
      description: Returns list of all devices.
      producers:
        - application/json
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/search'
        - $ref: '#/components/parameters/network'
        - $ref: '#/components/parameters/online'
        - $ref: '#/components/parameters/sortDevices'
        - $ref: '#/components/parameters/tower'
        - $ref: '#/components/parameters/site'
        - $ref: '#/components/parameters/deviceType'
        - $ref: '#/components/parameters/msp'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/basic.yaml#devices'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '422':
          description: Request params are malformed
        5XX:
          description: Unexpected error
    post:
      tags:
        - Devices
      summary: Onboard device
      description: Onboard device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/body'
                - $ref: '#/components/schemas/body-2'
                - $ref: '#/components/schemas/body-3'
                - $ref: '#/components/schemas/body-4'
                - $ref: '#/components/schemas/body-5'
                - $ref: '#/components/schemas/body-6'
                - $ref: '#/components/schemas/body-7'
                - $ref: '#/components/schemas/body-8'
                - $ref: '#/components/schemas/body-9'
                - $ref: '#/components/schemas/body-10'
                - $ref: '#/components/schemas/body-11'
            example:
              mac: '11:22:33:44:55:66'
              name: Test
              type: wifi-enterprise
              approved: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/common.yaml#write'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '422':
          description: Request params are malformed
        5XX:
          description: Unexpected error
  /devices/{mac}:
    get:
      tags:
        - Devices
      summary: Returns a device information.
      description: Returns a device information with MAC filter.
      producers:
        - application/json
      parameters:
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/network'
        - $ref: '#/components/parameters/status'
        - $ref: '#/components/parameters/tower'
        - $ref: '#/components/parameters/site'
        - $ref: '#/components/parameters/deviceType'
        - $ref: '#/components/parameters/msp'
        - $ref: '#/components/parameters/mac'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/basic.yaml#devices'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '422':
          description: Request params are malformed
        5XX:
          description: Unexpected error
    put:
      tags:
        - Devices
      summary: Update device
      description: Update device
      parameters:
        - name: mac
          in: path
          required: true
          description: Device MAC
          schema:
            type: string
            minLength: 17
            maxLength: 17
          allowReserved: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/body-12'
                - $ref: '#/components/schemas/body-13'
                - $ref: '#/components/schemas/body-14'
                - $ref: '#/components/schemas/body-15'
                - $ref: '#/components/schemas/body-16'
                - $ref: '#/components/schemas/body-17'
                - $ref: '#/components/schemas/body-18'
                - $ref: '#/components/schemas/body-19'
                - $ref: '#/components/schemas/body-20'
                - $ref: '#/components/schemas/body-21'
                - $ref: '#/components/schemas/body-22'
            example:
              name: Test
              approved: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/common.yaml#write'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '422':
          description: Request params are malformed
        5XX:
          description: Unexpected error
    delete:
      tags:
        - Devices
      summary: Delete device
      description: Delete device
      parameters:
        - $ref: '#/components/parameters/mac'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/common.yaml#write'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '422':
          description: Request params are malformed
        5XX:
          description: Unexpected error
  /devices/{mac}/reboot:
    post:
      tags:
        - Devices
      summary: Reboot device
