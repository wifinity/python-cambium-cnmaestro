          maxItems: 4
          items:
            type: object
            additionalProperties: false
            properties:
              id:
                type: string
                default: ''
                enum:
                  - ''
                  - credential-type
                  - expanded-eap
                  - expanded-inner-eap
                  - inner-auth-eap
                  - non-eap-inner-aut
                  - tunneled-eap-method-credential-type
              value:
                type: string
                default: ''
                enum:
                  - ''
                  - anonymous
                  - certificate
                  - chap
                  - expanded-eap
                  - expanded-inner-eap
                  - hardware-token
                  - mschap
                  - mschapv2
                  - nfc-secure
                  - pap
                  - reserved
                  - sim
                  - soft-token
                  - username-passwd
                  - vendor-specific
        method:
          default: ''
          type: string
          enum:
            - ''
            - crypto-card
            - eap-aka
            - eap-sim
            - eap-tls
            - eap-ttls
            - generic-token-card
            - identity
            - notification
            - one-time-password
            - peap
            - peap-mschapv2
    nai_realm:
      type: object
      additionalProperties: false
      properties:
        eap1:
          $ref: '#/components/schemas/nai_eap'
        eap2:
          $ref: '#/components/schemas/nai_eap'
        eap3:
          $ref: '#/components/schemas/nai_eap'
        eap4:
          $ref: '#/components/schemas/nai_eap'
        eap5:
          $ref: '#/components/schemas/nai_eap'
