          type: string
    aaa_auth:
      description: Authentication Server
      type: object
      additionalProperties: false
      properties:
        host:
          type: string
        secret:
          type: string
        port:
          default: 1812
          type: integer
          minimum: 1
          maximum: 65535
        realm:
          type: string
    aaa_acct:
      description: Accounting Server
      type: object
      additionalProperties: false
      properties:
        host:
          type: string
        secret:
          type: string
        port:
          default: 1812
          type: integer
          minimum: 1
          maximum: 65535
    time_range:
      description: Time range in the format "HH:MM-HH:MM"
      oneOf:
        - type: string
          pattern: ^((?:[01]\d:[0-5][0-9]|2[0-3]:[0-5][0-9])(?:\s?)-(?:\s?)(?:[01]\d:[0-5][0-9]|2[0-3]:[0-5][0-9]))$
        - type: 'null'
    wlan_body:
      type: object
      additionalProperties: false
      properties:
        access_list:
          type: object
          additionalProperties: false
          properties:
            acl_policy:
              description: MAC Authentication Policy
              type: string
              enum:
                - deny
                - allow
                - radius
                - cnmaestro
            acl_rule:
              type: array
              maxItems: 256
              items:
                type: object
                additionalProperties: false
                required:
                  - precedence
                properties:
                  action:
                    description: Permit, deny or route the policy
                    type: string
                    enum:
                      - permit
                      - deny
                      - route
                  description:
                    description: ACL rule description
                  dip:
                    description: Destination IP
                    type: string
                    oneOf:
                      - format: CNS_IPv6
                      - format: CNS_IPv4
                      - enum:
                          - any
                  dip_mask:
                    description: Destination IP Mask
                    oneOf:
                      - type: string
                        format: CNS_IPv4
                      - type: integer
                        minimum: 0
                        maximum: 128
                      - type: string
                        enum:
                          - any
                  dir:
                    description: Direction
                    type: string
                    enum:
                      - in
                      - out
                      - any
                  dmac:
                    description: Destination MAC address
                    anyOf:
                      - type: string
                        format: CNS_HYP_MAC
                      - type: string
                        enum:
                          - any
                  dmac_mask:
                    description: Destination MAC address mask. "FF-FF-FF-00-00-00" for any.
                    type: string
                    format: CNS_HYP_MAC
                  dport:
                    description: Destination Port
                    anyOf:
                      - type: integer
                        minimum: 0
                        maximum: 65535
                      - type: string
                        enum:
                          - any
                  precedence:
                    type: integer
                    minimum: 0
                    maximum: 255
                  protocol:
                    $ref: '#/components/schemas/acl_protocol'
                  sip:
                    description: Source IP
                    type: string
                    oneOf:
                      - format: CNS_IPv6
                      - format: CNS_IPv4
                      - enum:
                          - any
                  sip_mask:
                    description: Source IP Mask
                    oneOf:
                      - type: string
                        format: CNS_IPv4
                      - type: integer
                        minimum: 0
                        maximum: 128
                      - type: string
                        enum:
                          - any
                  smac:
                    description: Source MAC address
                    anyOf:
                      - type: string
                        format: CNS_HYP_MAC
                      - type: string
                        enum:
                          - any
                  smac_mask:
                    description: Source MAC address mask. "FF-FF-FF-00-00-00" for any.
                    type: string
                    format: CNS_HYP_MAC
                  sport:
                    description: Source Port
                    anyOf:
                      - type: integer
                        minimum: 0
                        maximum: 65535
                      - type: string
                        enum:
                          - any
                  type:
                    description: Type
                    type: string
                    enum:
                      - ip
                      - ip6
                      - mac
                      - proto
                      - proto6
            dns_acl:
              type: array
              maxItems: 256
              items:
                type: object
                additionalProperties: false
                required:
                  - domain
                  - permit
                  - precedence
                properties:
                  domain:
                    type: string
                  permit:
                    description: Permit or deny policy
                    type: boolean
                  precedence:
                    type: integer
                    minimum: 1
                    maximum: 256
            enable_acp:
              type: boolean
              default: false
              description: Indicates if access control policy is attached to the WLAN.
            wlan_group_acp:
              type: string
              description: Name of access control policy that should be attached to the WLAN.
            mac_auth_delimiter:
              description: MAC Authentication RADIUS delimeter
              type: string
              enum:
                - ':'
                - '-'
            mac_auth_rad_pass:
              description: MAC Authentication RADIUS password
              default: true
              type:
                - boolean
                - 'null'
            mac_auth_uppercase:
              description: MAC Authentication RADIUS Upper-Case
              type:
                - boolean
                - 'null'
            mac_list:
              description: MAC Authentication List.  Applicable if acl_policy is allow or deny
              type: array
              items:
                required:
                  - mac
                type: object
                additionalProperties: false
                properties:
                  description:
                    type: string
                  mac:
                    type: string
                    format: CNS_MAC
        advanced:
          type: object
          additionalProperties: false
          properties:
