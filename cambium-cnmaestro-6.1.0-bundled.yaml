  /devices/clients/summary:
    get:
      tags:
        - Wi-Fi
      summary: Returns Wi-Fi wireless clients summary.
      description: |-
        Retrieve aggregated Wi-Fi wireless client data updated in the last 7 days.  

        **Timespan vs Time Range**:

        > a. You can provide either a time range (`start_time` and `stop_time`) or a `timespan`.  

        > b. You should provide a time period greater than 1 hour, as the data is available in 1-hour granularity.  

        > c. If neither is provided, a default timespan of 24 hours is applied.  

        This API is compatible only with **cnPilot Enterprise** devices.  

        **Continuation-Based API Workflow**:  

        **Status LifeCycle**:
          > `InPreparing` > `Ready`/`Failed` > `InProgress` > `Completed`  

        >**Step 1**: "Initial Request"  
        >> **Description**:  
        >> a. Populate all required details except the `continuation_token` and send your first request.

        >**Step 2**: "InPreparing"  
        >> **Description**:  
        >>a. In response, you will receive a `status` of "InPreparing" under the paging object along with a `next_continuation_token`. eg. { paging: { status: 'InPreparing', next_continuation_token: 'xyz' } }  

        >>b. Use `next_continuation_token` from response as `continuation_token` in subsequent request as sole parameter. Repeat until you receive a status of 'Ready' or 'Failed'.  

        >**Step 3**: "Status Handling of Ready or Failed"  
        >> **Status**: "Ready"  
        >>> **Action**:  
        >>>a. You will receive `download_url`(expiry: 5 minutes), `next_continuation_token` and `status` under the paging object. eg. { paging: { status: 'Ready', next_continuation_token: 'xyz', download_url: 'http....' } }  

        >>>b. You can use `download_url` to download whole data or continue by using the provided `next_continuation_token` from response as `continuation_token` in the subsequent request to get paginated data.  

        >>>c. You can also use the `per_page` parameter to iterate through the available data. A maximum of 100 records will be fetched per request when the per_page value is not specified.

        >> **Status**: "Failed"  
        >>> **Action**:  
        >>>a. No new `next_continuation_token` will be provided. eg. { paging: { status: 'Failed' } }  

        >>>b. You must restart the process from step 1.

        >**Step 4**: "InProgress"  
        >> **Description**:  
        >>a. When the status is "InProgress," it indicates that there is data in the response and more data to iterate through. eg. { paging: { status: 'InProgress', next_continuation_token: 'xyz' }, data: [{...}] }  

        >>b. You can continue iterating through the data using the `next_continuation_token` from response as `continuation_token` in subsequent requests.  

        >>c. You can also use the `per_page` parameter to iterate through the available data. A maximum of 100 records will be fetched per request when the per_page value is not specified.

        >**Step 5**: "Completed"  
        >> **Description**:  
        >>a. When the status is "Completed", it indicates that the iteration is finished. eg. { paging: { status: 'Completed' }, data: [{...}] }  

        >>b. At this point, you will not receive a `next_continuation_token`, signaling you can stop the iteration.

        **Notes**:  
        1. When an API request returns a status of 'Ready', the associated response data is temporarily stored and accessible. This data has a finite retention period. After 24 hours, the response data will no longer be available.
      parameters:
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/msp'
        - $ref: '#/components/parameters/per_page'
        - $ref: '#/components/parameters/start_time'
        - $ref: '#/components/parameters/stop_time'
        - $ref: '#/components/parameters/timespan'
        - $ref: '#/components/parameters/continuation_token'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/clients.yaml#devices.wifi.clients'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '422':
          description: Request params are malformed
        5XX:
          description: Unexpected error
  /devices/{mac}/clients/summary:
