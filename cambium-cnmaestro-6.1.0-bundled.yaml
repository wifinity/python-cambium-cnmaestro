    body-66:
      type: object
      required:
        - entries
      properties:
        managed_account:
          description: Managed account ID of the WLAN being edited
          type: string
        entries:
          description: ePSK entries to add to the WLAN
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required:
              - username
            properties:
              mac:
                description: MAC address of the client
                type: string
                pattern: ^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$
              passphrase:
                description: Passphrase of this entry. May not contain '\/? =-+ or a space character.
                type: string
                minLength: 8
                maxLength: 32
                pattern: ^[^'\\/? =\-+]*$
              username:
                description: Username of the entry
                type: string
                minLength: 1
                maxLength: 31
              vlan:
                description: The VLAN(s) to which the user's traffic should be mapped.
                type: integer
                minimum: 1
                maximum: 4094
              expiration_time:
                description: Expiry time for the epsk will be set to default "none". And maximum of 5 year can be set. It will pick the date and time '2024-06-08T05:17:00.000Z'(ISO time) or duration (2 - hours/days/months/years). which will be converted to epoch and saved.
                type: string
    body-67:
      type: object
      description: Used to generate a single ePSK entry with a passphrase or multiple entries with automatically generated passphrases.
      additionalProperties: false
      required:
        - username
      properties:
        count:
          description: Number of ePSK entries that should be created
          type: integer
          minimum: 1
          default: 1
        mac:
          description: MAC address of the client.  Only valid with a count value of 1
          type: string
          pattern: ^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$
        managed_account:
          description: Managed account ID of the WLAN being edited
          type: string
        passphrase:
          description: Passphrase of this entry. May not contain '\/? =-+ or a space character.
          type: string
          minLength: 8
          maxLength: 32
          pattern: ^[^'\\/? =\-+]*$
        passphrase_strength:
          description: Required strength of passphrase.  Valid values are “strong”, “easy” and “numbers”.  Only used if passphrase is not supplied.  Defaults to “strong”.
          type: string
          enum:
            - strong
            - easy
            - numbers
        username:
          description: Username of the entry.  If count is greater than 1 a postfix will be added for each entry.  i.e. username-1, username-2
          type: string
          minLength: 1
          maxLength: 31
        vlan:
          description: The VLAN(s) to which the user's traffic should be mapped .  This can be in the form of a single entry, a comma delimited list, or a range.  i.e., “1”, “1,5,7”, or “1-10”.
          type: string
        expiration_time:
          description: Expiry time for the epsk will be set to default "none". And maximum of 5 year can be set. It will pick the date and time '2024-06-08T05:17:00.000Z'(ISO time) or duration (2 - hours/days/months/years). which will be converted to epoch and saved.
          default: none
          type: string
    body-68:
