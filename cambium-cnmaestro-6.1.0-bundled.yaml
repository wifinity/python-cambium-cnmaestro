    application_groups:
      type: array
      default: []
      maxItems: 16
      items:
        type: object
        additionalProperties: false
        required:
          - name
        properties:
          name:
            type: string
            maxLength: 64
            pattern: ^[\w\-]{1,64}$
          desc:
            type: string
          applications:
            description: application id
            anyOf:
              - type: 'null'
              - type: array
                items:
                  anyOf:
                    - $ref: '#/components/schemas/legacy_applications-2'
                    - $ref: '#/components/schemas/new_applications-2'
                    - type: string
                      minLength: 1
                      maxLength: 30
                      description: custom apps
          categories:
            anyOf:
              - type: 'null'
              - type: array
                items:
                  type: string
                  enum:
                    - social
                    - message
                    - web_srvc
                    - stream
                    - mail
                    - filexfer
                    - network
                    - games
                    - other
                    - vpn_tun
                    - remote
                    - monitor
                    - collab
                    - proxy
                    - database
    filter:
      type: object
      additionalProperties: false
      properties:
        id:
          description: 'Rule ID. NSE 3000: 1-150, NSE 4000: 1-500.'
          type: number
          minimum: 1
          maximum: 500
        desc:
          type: string
          maxLength: 64
        action:
          type: string
          enum:
            - permit
            - deny
          default: permit
        type:
          type: string
          default: layer3-filter
          enum:
            - layer3-filter
            - layer7-filter
        proto:
          type: string
          enum:
            - tcp
            - udp
            - icmp
            - any
          default: any
        sport:
          type: string
          default: any
          pattern: ^[0-9]+$|^any$
          minimum: 1
          maximum: 65535
        src:
          type: string
          pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$|^any$
        src_mask:
          type: string
        dest:
          type: string
          pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$|^any$
        dest_mask:
          type: string
          pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$|^any$
        dport:
          type: string
          pattern: ^[0-9]+$|^any$
          minimum: 1
          maximum: 65535
          default: any
        dpi-app-name:
          description: application id
          anyOf:
            - $ref: '#/components/schemas/legacy_applications-2'
            - $ref: '#/components/schemas/new_applications-2'
            - type: string
              minLength: 1
              maxLength: 30
              description: custom apps
        dpi-cat-name:
          type: string
          enum:
            - social
            - message
            - web_srvc
            - stream
            - mail
            - filexfer
            - network
            - games
            - other
            - vpn_tun
            - remote
            - monitor
            - collab
            - proxy
            - database
        dpi-config-type:
          type: string
          enum:
            - application
            - category
            - application_group
        application-group:
          type: string
          description: application group name
        user-group:
          type: string
          description: user group name
        ip-address:
          type: string
          pattern: ^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)(?:\/(?:3[0-2]|[12]?[0-9]))?$
          description: IP address or subnet
        allow_all_sources:
          type: boolean
          default: true
