      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/devices.yaml#device.action'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '422':
          description: Request params are malformed
        5XX:
          description: Unexpected error
    post:
      tags:
        - Devices
      summary: Initiate execution of CLI command.
      description: |
        Execute CLI Command using HTTP POST and HTTP GET to retrieve the results. This API is supported only on Enterprise Wi-Fi and cnMatrix devices.
      parameters:
        - $ref: '#/components/parameters/mac'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/body-24'
      responses:
        '200':
          description: OK
          content:
