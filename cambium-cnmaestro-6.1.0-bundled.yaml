      cnwave60.software.images:
        type: object
        additionalProperties: false
        properties:
          data:
            type: object
            additionalProperties: false
            properties:
              sync_in_progress:
                type: boolean
                description: Indicates if a software image sync is currently in progress.
              out_of_sync:
                type: boolean
                description: Indicates if any software images are out of sync.
              latest_image:
                type: object
                additionalProperties: false
                properties:
                  version:
                    type: string
                    description: Version string of the latest available image.
              recommended_version:
                type: string
                description: Recommended software version for the network.
              versions:
                type: object
                description: Map of available software versions and their sync status.
                additionalProperties:
                  type: object
                  additionalProperties: false
                  properties:
                    beta:
                      type: boolean
                      description: Indicates if this is a beta release.
                    out_of_sync:
                      type: boolean
                      description: Indicates if this version image is out of sync.
        example:
          data:
            sync_in_progress: false
            out_of_sync: true
            latest_image:
              version: "1.6.1"
            recommended_version: "1.6.1"
            versions:
              "1.6.1":
                beta: false
                out_of_sync: false
              "1.7":
                beta: false
                out_of_sync: true
              "1.7-beta1":
                beta: true
                out_of_sync: false

      cnwave60.network.configuration:
        type: object
        description: Network configuration overrides. Fields vary based on the network configuration schema.
        example:
          radioParamsBase:
            wsecParams:
              wpaPskParams: {}
          envParams:
            CAMBIUM_E2E_NETWORK_NAME: "60 GHz cnWave E2E"
            CAMBIUM_L2_BRIDGE_IFACE: ""

      cnwave60.controller.configuration:
        type: object
        description: Controller configuration overrides. Fields vary based on the controller configuration schema.
        example:
          flags:
            enable_deterministic_prefix_alloc: "true"
            scan_disable_periodic: "true"
          ignitionParams:
            enable: true
            linkUpDampenInterval: 17
            linkUpInterval: 9
          prefixAllocParams:
            allocPrefixLen: 64
            seedPrefix: "fd19:c085:8279::/48"
          topologyParams:
            country: "Other"
            enabledChannels: "1,2,3,4"
            maxSupportedNodes: 31

      cnwave60.device.configuration:
        type: object
        description: Device configuration overrides. Fields vary based on the device configuration schema.
        example:
          radioParamsBase:
            fwParams:
              txPower: 6
          envParams:
            CAMBIUM_NODE_NAME: "node-a"

      cnwave60.devices.overrides:
        type: object
        description: Map of device name to configuration overrides for all devices in the network.
        example:
          node-a:
            radioParamsBase:
              fwParams:
                txPower: 6
          node-b:
            popParams:
              POP_IFACE: "nic2"

      cnwave60.devices.auto.overrides:
        type: object
        description: Map of device name to auto-computed configuration overrides for all devices in the network.
        example:
          node-a:
            radioParamsBase:
              fwParams:
                txPower: 6

      cnwave60.job:
        type: object
        additionalProperties: false
        properties:
          job_id:
            type: string
            description: Unique identifier of the created job.
        example:
          job_id: "abc123-def456-ghi789"

      cnwave60.write:
        type: object
        additionalProperties: false
        properties:
          message:
            type: string
            description: Result of the operation.
        example:
          message: "success"

      cnwave60.action:
        type: object
        description: Result of the action. Fields vary based on the specific action performed and the device response.
        example:
          status: "success"
          result: {}
    body-81:
      type: object
      properties:
        mac:
          type: string
          format: CNS_MAC
          description: The MAC of the node to be used as replacement.
        msn:
          type: string
          description: The serial number of the node to be used as replacement.
        managed_account:
          type: string
          description: managed account ID
      additionalProperties: false
    body-82:
      type: object
      required:
        - cmd
      additionalProperties: false
      properties:
        cmd:
          type: integer
          description: |
            Remote command id to be executed on the device. 
            List of supported commands can be fetched using /cnwave60/devices/{mac}/remote_command/list_commands
          minimum: 1
    body-83:
      type: object
      additionalProperties: false
      description: 'Specify exactly one destination type: destination_node (for Node-to-Node), destination_ipv4, or destination_ipv6'
      properties:
        destination_node:
          type: string
          description: Destination node name (for Node-to-Node ping). Mutually exclusive with destination_ipv4 and destination_ipv6
        destination_ipv4:
          type: string
          description: Destination IPv4 address. Mutually exclusive with destination_node and destination_ipv6
          format: CNS_IPv4
        destination_ipv6:
          type: string
          description: Destination IPv6 address. Mutually exclusive with destination_node and destination_ipv4
          format: CNS_IPv6
        options:
          type: object
          additionalProperties: false
          properties:
            count:
              type: integer
              default: 3
              minimum: 1
              maximum: 10
              description: Number of ping packets to send
            packet_size:
              type: integer
              default: 56
              minimum: 1
              maximum: 65507
              description: Size of ping packet in bytes
    security.yaml#devices.nse.mac: |-
      devices.nse.mac.threats:
        type: object
        additionalProperties: false
        properties:
          paging:
            $ref: "../common/paging.yaml#paging"
          data:
            type: array
            items:
              type: object
              additionalProperties: false
              properties:
                device_mac:
                  type: string
                  description: MAC Address of NSE.
                severity:
                  type: string
                  enum:
                    - critical
                    - major
                    - minor
                  description: Severity levels of threat
                country:
                  type: string
                  description: Country from where the threat is received
                date_time:
                  type: string
                  description: Date and Time in ISO 8601 format of when the threat was received
                src_ip:
                  type: string
                  description: Source IP Address of the threat
                dest_ip:
                  type: string
                  description: Destination IP Address of the threat
                class:
                  type: string
                  description: Class type of the threat
        example:
          paging:
            offset: 0
            limit: 100
            total: 1
            next_continuation_token: "next_continuation_token"
          data:
            - device_mac: 00:00:00:00:00:01
              severity: critical
              country: India
              date_time: "2023-08-03T11:30:00+00:00"
              src_ip: 192.168.0.1
              dest_ip: 192.0.0.1
              class: malware-attack

      devices.nse.mac.dns.filtering:
        type: object
        additionalProperties: false
        properties:
          paging:
            $ref: "../common/paging.yaml#paging"
          data:
            type: array
            items:
              type: object
              additionalProperties: false
              properties:
                device_mac:
                  type: string
                  description: MAC Address of NSE.
                client_mac:
                  type: string
                  description: MAC Address of the client
                client_ip:
                  type: string
                  description: IP Address of the client
                domain_name:
                  type: string
                  description: Domain name
                domain_category:
                  type: string
                  description: Domain category of the DNS filtering event
                domain_blocked_policy:
                  type: string
                  description: Policy applied on the DNS query (Allowed / Blocked)
        example:
          paging:
            next_continuation_token: "next_continuation_token"
            limit: 10
          data:
            - device_mac: 00:00:00:00:00:01
              client_mac: 00:00:00:00:00:02
              client_ip: 192.168.0.1
              domain_name: example.com
              domain_category: malicious
              domain_blocked_policy: blocked

      devices.nse.mac.vpnSessions:
        type: object
        additionalProperties: false
        properties:
          paging:
            $ref: "../common/paging.yaml#paging"
          data:
            type: array
            items:
              type: object
              additionalProperties: false
              properties:
                device_mac:
                  type: string
                  description: MAC Address of NSE
                session_id:
                  type: string
                  description: Session id of the VPN session
                user_name:
                  type: string
                  description: username of the remote session 
                ip:
                  type: string
                  description: IP Address of the remote user
                start_time:
                  type: string
                  description: Start time of the session in ISO 8601 format
                end_time:
                  type: string
                  description: End time of the session in ISO 8601 format
                duration_sec:
                  type: integer
                  description: Active time interval in seconds of the respective VPN Session
                status:
                  type: string
                  description: Current status of the VPN session
                termination_reason:
                  type: string
                  description: Termination reason of the session 
                upload_bytes:
                  type: integer
                  description: Amount of data(bytes) uploaded during the session 
                download_bytes:
                  type: integer
                  description: Amount of data(bytes) downloaded during the session 
        example:
          paging:
            offset: 0
            limit: 100
            total: 1
          data:
            - device_mac: 00:00:00:00:00:01
              session_id: session_id_1
              user_name: user_1
              ip: 192.168.0.1
              start_time: "2023-08-03T11:30:00+00:00"
              end_time: "2023-08-04T11:30:00+00:00"
              duration_sec: 1000
              status: active
              termination_reason: disconnected
              upload_bytes: 10
              download_bytes: 20

      devices.nse.mac.vulClients:
        type: object
        additionalProperties: false
        properties:
          paging:
            $ref: "../common/paging.yaml#paging"
          data:
            type: array
            items:
              type: object
              additionalProperties: false
              properties:
                device_mac:
                  type: string
                  description: MAC Address of NSE
                name:
                  type: string
                  description: Client name
                client_mac:
                  type: string
                  description: MAC address of the client
                ip:
                  type: string
                  description: IP Address of the client
                vulnerability_distribution:
                  additionalProperties: false
                  properties:
                    minor:
                      type: integer
                    major:
                      type: integer
                    critical:
                      type: integer
                  type: object
                  description: Severity distribution of vulnerabilities
                client_device:
                  type: string
                  description: Device type used by the client
                os:
                  type: string
                  description: Operating system of client
                last_scan:
                  type: string
                  description: Date and Time in ISO 8601 format of when the vulnerability was last scanned
        example:
          paging:
            offset: 0
            limit: 100
            total: 1
          data:
            - device_mac: 00:00:00:00:00:01
              name: client-1
              client_mac: 00:00:00:00:00:02
              ip: 192.168.0.1
              vulnerability_distribution:
                minor: 3
                major: 2
                critical: 1
              client_device: laptop
              os: macOS
              last_scan: "2023-08-03T11:30:00+00:00"

      devices.nse.mac.clients.vulnerabilities:
        type: object
        additionalProperties: false
        properties:
          paging:
            $ref: "../common/paging.yaml#paging"
          data:
            type: array
            items:
              type: object
              additionalProperties: false
              properties:
                device_mac:
                  type: string
                  description: MAC Address of NSE
                cve_id:
                  type: string
                  description: CVE Identifier
                service:
                  type: string
                  description: Service in which the vulnerability was found
                product:
                  type: string
                  description: Name of the product having the vulnerability
                product_ver:
                  type: string
                  description: Version of the product having the vulnerability
                severity:
                  type: string
                  enum:
                    - critical
                    - major
                    - minor
                  description: Severity level of vulnerability
                client_mac:
                  type: string
                  description: MAC address of the client
                port:
                  type: string
                  description: Vulnerable port
                exploited:
                  type: string
                  enum:
                    - Yes
                    - No
                  description: Indicates if the vulnerability was exploited
                exploitation_probability_percentage:
                  type: string
                  description: Percentage probabilty that a vulnerability will be exploited (in the next 30 days)
                num_clients_impacted:
                  type: string
                  description: Number of clients impacted by the vulnerability
        
        example:
          paging:
            offset: 0
            limit: 100
            total: 1
          data:
            - device_mac: 00:00:00:00:00:01
              cve_id: CVE-2023-01
              service: service-1
              product: product-1
              product_ver: 1.1.1
              severity: critical
              client_mac: 00:00:00:00:00:02
              port: 8080
              exploited: Yes
              exploitation_probability_percentage: 99.99
              num_clients_impacted: 1
