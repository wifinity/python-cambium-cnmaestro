  /devices/{mac}/threats:
    get:
      tags:
        - Security
      summary: Returns threats captured by an NSE device.
      description: |-
        Retrieve threat data collected by an NSE device.

        **Pagination Methods**:

        This API supports two pagination methods: **offset-based** (deprecated) and **continuation token-based** (recommended).

        **a. Offset-Based Pagination (Deprecated)**:

        The `offset` request parameter is deprecated and will be removed in a 6.1.0 release. Please use the `continuation_token` request parameter instead.
        The `total` response field is deprecated and will be removed in a 6.1.0 release.

        When using offset-based pagination, the response includes:
        - `offset`: Current offset value
        - `limit`: Maximum number of items per page
        - `total`: Total number of threats available

        **Example**: First request with `offset=0&limit=100` will return:
        ```json
        {
          "paging": {
            "offset": 0,
            "limit": 100,
            "total": 500
          },
          "data": [...]
        }
        ```

        **b. Continuation Token-Based Pagination (Recommended)**:

        This is the recommended approach for pagination. It provides better performance and reliability.

        **Initial Request**:

        Send your first request without `continuation_token` and without `offset` parameters.

        In current version, the response will include (for backward compatibility):
        - `offset`: Current offset value
        - `limit`: Maximum number of items per page
        - `total`: Total number of threats available
        - `next_continuation_token`: Token to use for the next page

        > **Note**: `offset` and `total` fields will be completely removed in a 6.1.0 release.

        **Subsequent Requests**:

        Use the `next_continuation_token` from the previous response as the `continuation_token` parameter.

        When using continuation token-based pagination, the response will include:
        - `limit`: Maximum number of items per page
        - `next_continuation_token`: Token for the next page (if more results exist)

        Continue using `continuation_token` until `next_continuation_token` is not present in the response.

        **Example Workflow**:

        1. **First request**: `GET /api/v2/devices/nse/{mac}/threats?start_time=2024-01-01T00:00:00Z&stop_time=2024-01-02T00:00:00Z&limit=100`

           **Response**:
           ```json
           {
             "paging": {
               "offset": 0,
               "limit": 100,
               "total": 500,
               "next_continuation_token": "abc123"
             },
             "data": [...]
           }
           ```

        2. **Second request**: `GET /api/v2/devices/nse/{mac}/threats?continuation_token=abc123`

           **Response**:
           ```json
           {
             "paging": {
               "limit": 100,
               "next_continuation_token": "def456"
             },
             "data": [...]
           }
           ```

        3. **Continue** until `next_continuation_token` is absent in the response.

        **Important Notes**:

        - Do not mix pagination methods. Once you start using `continuation_token`, do not use `offset` in subsequent requests.
        - The `offset` parameter will be removed in release 6.1.0. Migrate to continuation token-based pagination as soon as possible.
        - In current version, when using continuation token-based pagination, `offset` and `total` are only returned in the first response for backward compatibility. These fields will be completely removed in 6.1.0 release.
      parameters:
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/mac'
        - $ref: '#/components/parameters/msp'
        - $ref: '#/components/parameters/start_time.required'
        - $ref: '#/components/parameters/stop_time.required'
        - $ref: '#/components/parameters/severity'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset.deprecated'
        - $ref: '#/components/parameters/continuation_token.new'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/security.yaml#devices.nse.mac'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '422':
          description: Request params are malformed
        5XX:
          description: Unexpected error
