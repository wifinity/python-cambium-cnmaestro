        '404':
          description: Not Found
        '422':
          description: Request params are malformed
        5XX:
          description: Unexpected error
    post:
      tags:
        - Networks
      summary: Create network
      description: Create network
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/body-29'
            example:
              name: test_network
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/topology.yaml#network'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '422':
          description: Request params are malformed
        5XX:
          description: Unexpected error
  /networks/{network_name}:
    get:
      tags:
        - Networks
      summary: Returns single network information.
      description: Retrieve inventory data of network.
      producers:
        - application/json
      parameters:
