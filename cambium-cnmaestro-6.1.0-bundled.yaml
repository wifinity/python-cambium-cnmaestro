              syslog_server_port_2:
                type: integer
                description: "Secondary syslog server port."
              syslog_severity:
                type: integer
                description: "Syslog severity level (0-7)."
              time_zone:
                type: string
                description: "Time zone identifier (e.g., asia-kolkata)."
          pppoe:
            type: object
