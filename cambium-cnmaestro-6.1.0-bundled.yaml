    body-52:
      type: object
      additionalProperties: false
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 256
          description: Display name for the onboarding user.
        email:
          type: string
          minLength: 3
          maxLength: 256
          pattern: ^[A-Z0-9a-z._%+-]+@[A-Za-z0-9]+([A-Za-z0-9-]*[A-Za-z0-9])*(\.[A-Za-z0-9]+([A-Za-z0-9-]*[A-Za-z0-9])*)*\.[A-Za-z]{2,64}$
          errorMessage: field must be a valid email.
          description: Email address of the onboarding user.
        group:
          type: string
          minLength: 1
          maxLength: 256
          description: Group name for categorizing the onboarding user.
        note:
          type: string
          maxLength: 256
          description: Optional notes or comments about the onboarding user.
        passphrase:
          type: string
          minLength: 8
          maxLength: 64
          description: Passphrase for the onboarding user.
        device_limit:
          type: integer
          minimum: 1
          maximum: 200
          description: Maximum number of devices the user can connect.
        expire:
          type: boolean
          description: |
            Indicates whether the user should never expire. If false, the expiration time will be ignored.
        activation:
          type: string
          description: |
            ISO 8601 timestamp when the user should be activated (e.g., 2024-01-01T00:00:00Z).  Must be a future timestamp.
        expiration:
          type: string
          description: |
            ISO 8601 timestamp when the user should expire (e.g., 2024-12-31T23:59:59Z).  Must be a future timestamp and after activation time.
        managed_account:
          description: |
            Managed account name
          type: string
    body-53:
      type: object
      additionalProperties: false
      required:
        - user_ids
      properties:
        action:
          type: string
          enum:
            - extend
            - email
            - reset
            - delete
          description: |
            The action to perform on the onboarding users. Allowed values are extend, email, reset, delete.
        user_ids:
          type: array
          items:
            type: string
          minItems: 1
          description: |
            An array of user IDs to include in the operation.
        managed_account:
          description: |
            Managed account name
          type: string
    body-54:
      type: object
      additionalProperties: false
      required:
