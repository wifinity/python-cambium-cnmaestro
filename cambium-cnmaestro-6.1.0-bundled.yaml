  /wifi_enterprise/wlans/{wlan_name}/epsk/generate:
    post:
      tags:
        - WLANs
      summary: Generate ePSK entries for a WLAN
      description: |
        Create new ePSK entries within an ePSK Policy. Maximum number of ePSK entries per WLAN may not exceed 2000. Change made are staged for 30 seconds since the last  AP Group, WLAN edit or ePSK  request before being committed to the live database. This prevents extra configuration messages needing to be sent to devices for Auto-Sync. During this 30 second period, staged change will only be viewable to the API session that made the changes. The associated WLAN will also be locked to that API session during this time, meaning that other users will be blocked from making changes.  Changes can be committed immediately with the Configuration -> Commit API. URL ---> PUT /configuration/commit
      parameters:
        - $ref: '#/components/parameters/wlan_name'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              anyOf:
                - $ref: '#/components/schemas/body-66'
                - $ref: '#/components/schemas/body-67'
            example:
              count: 1
              mac: 00:00:00:FF:FF:FF
              passphrase: Password123$%^
              username: Lab_laptop
              vlan: '20'
              expiration_time: 2-days
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/common.yaml#write'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '422':
          description: Request params are malformed
        5XX:
          description: Unexpected error
