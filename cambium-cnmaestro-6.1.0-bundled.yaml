                tunnel_l2gre2_remote_host: "0.0.0.0"
                tunnel_l2gre_dscp: 0
                tunnel_l2gre_pmtudisc: true
                tunnel_l2gre_tcp_mss: 1410
                tunnel_l2gre_mss_clamp: true
                tunnel_l2gre_mtu: 1460
                tunnel_l2tp_tcp_mss: 1400
                tunnel_l2tp_mss_clamp: true
                tunnel_l2tp_pmtudisc: true
