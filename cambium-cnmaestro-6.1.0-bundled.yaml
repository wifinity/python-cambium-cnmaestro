                  type: string
                  description: MAC address of the Z-side node.
                a_node_name:
                  type: string
                  description: Name of the A-side node.
                z_node_name:
                  type: string
                  description: Name of the Z-side node.
                status:
                  type: string
                  description: "Link online status (e.g., 'Online', 'Offline')."
                link_status_time_in_sec:
                  type: integer
                  description: Time in seconds since the link status last changed.
                type:
                  type: string
                  description: "Link type (e.g., 'wireless', 'wired')."
