              properties:
                creation_time:
                  type: string
                  description: "ISO 8601 timestamp when the ePSK entry was created."
                mac:
                  type: string
                  nullable: true
                  description: "MAC address bound to this ePSK entry."
                managed_account:
                  type: string
                  description: "Managed account this ePSK entry belongs to."
                passphrase:
                  type: string
                  description: "Pre-shared key passphrase."
                username:
                  type: string
                  description: "Username associated with this ePSK entry."
                vlan:
                  type: string
                  nullable: true
                  description: "VLAN assigned to this ePSK entry."
                expiration_time:
                  type: string
                  description: "Expiration timestamp (milliseconds since epoch)."
        example:
          paging:
            offset: 0
            limit: 2
            total: 1
          data:
            - creation_time: "2025-11-11T15:30:06+05:30"
              mac: null
              managed_account: ""
              passphrase: "Password123"
              username: "user1"
              vlan: null
              expiration_time: "1794391206090"
    alphanumeric_underscore_dash:
      type: string
