          content:
            application/json:
              schema:
                $ref: '#/components/schemas/devices.yaml#device.action'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '422':
          description: Request params are malformed
        5XX:
          description: Unexpected error
  /networks:
    get:
      tags:
        - Networks
      summary: Returns list of networks.
      description: Retrieve inventory data of networks.
      producers:
        - application/json
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/fields'
        - $ref: '#/components/parameters/msp'
