        lan_interfaces:
          description: LAN / VLAN interface list. Max 250 for NSE 3000, max 500 for NSE 4000.
          type: array
          default:
            - vlan_id: 1
              name: VLAN-1
              ip_mode: static
              ip_addr: 192.168.200.1
              subnet_mask: 255.255.255.0
              management_access: enable
              rate_limit: disable
              dhcp: dhcp_pool
              dhcp_pool_enable: true
              dhcp_relay_enable: false
              dhcp_pool_lease_time: null
              dhcp_pool_domain_name: cambium
              dhcp_pool_end_address: 192.168.200.150
              dhcp_pool_start_address: 192.168.200.50
              dhcp_pool_primary_dns_server: 192.168.200.1
              device_identity: true
          minItems: 1
          maxItems: 500
          items:
            type: object
            additionalProperties: false
            required:
              - vlan_id
              - name
            properties:
              vlan_id:
                type: integer
                minimum: 1
                maximum: 4094
              name:
                type: string
                maxLength: 32
              desc:
                type: string
                maxLength: 64
              ip_addr:
                type: string
                format: CNS_IPv4
              ip_mode:
                type: string
                enum:
                  - dynamic
                  - static
                default: static
              management_access:
                type: string
                enum:
                  - disable
                  - enable
                default: enable
              subnet_mask:
                type: string
                format: CNS_SUBNET_MASK
              device_identity:
                type: boolean
                default: true
              dhcp:
                type: string
                default: none
                enum:
                  - none
                  - dhcp_pool
                  - dhcp_relay
              dhcp_relay:
                additionalProperties: false
                type: object
                properties:
                  enable:
                    type: boolean
                    default: false
                  relay_server_ip:
                    anyOf:
                      - type: 'null'
                      - type: string
                        pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$
              dhcp_pool_config:
                additionalProperties: false
                type: object
                required:
                  - dhcp_pool_start_address
                  - dhcp_pool_end_address
                properties:
                  dhcp_pool_enable:
                    type: boolean
                    default: true
                  dhcp_pool_start_address:
                    anyOf:
                      - type: 'null'
                      - type: string
                        pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$
                  dhcp_pool_end_address:
                    anyOf:
                      - type: 'null'
                      - type: string
                        pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$
                  dhcp_pool_primary_dns_server:
                    anyOf:
                      - type: 'null'
                      - type: string
                        pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$
                  dhcp_pool_secondary_dns_server:
                    anyOf:
                      - type: 'null'
                      - type: string
                        pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$
                  dhcp_pool_domain_name:
                    anyOf:
                      - type: 'null'
                      - type: string
                  dhcp_pool_lease_time_day:
                    anyOf:
                      - type: 'null'
                      - type: integer
                        default: 0
                        minimum: 0
                        maximum: 365
                  dhcp_pool_lease_time_hour:
                    anyOf:
                      - type: 'null'
                      - type: integer
                        default: 2
                        minimum: 0
                        maximum: 23
                  dhcp_pool_lease_time_minute:
                    anyOf:
                      - type: 'null'
                      - type: integer
                        default: 0
                        minimum: 0
                        maximum: 59
                  dhcp_pool_bind_list:
                    description: Static DHCP bindings for this VLAN. Max 200 per VLAN (both NSE 3000 and NSE 4000).
                    type: array
                    default: []
                    maxItems: 200
                    items:
                      type: object
                      additionalProperties: false
                      required:
                        - ip
                        - mac
                      properties:
                        ip:
                          type: string
                          pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$
                        mac:
                          type: string
                          format: CNS_MAC
                        desc:
                          type: string
                          maxLength: 64
                  dhcp_options:
                    type: array
                    default: []
                    items:
                      type: object
                      additionalProperties: false
                      required:
                        - code
                        - type
                        - value
                      properties:
                        code:
                          type: number
                          minimum: 1
                          maximum: 254
                        type:
                          type: string
                          enum:
                            - text
                            - IP
                            - hex
                          description: 'text: ASCII text string, IP: IPv4 address, hex: hexadecimal(series of octets specified in hexadecimal, separated by colons)'
                        value:
                          type: string
                          maxLength: 64
              rate_limit_rules:
                type: object
                additionalProperties: false
                properties:
                  rate_limit:
                    type: string
                    enum:
                      - enable
                      - disable
                    description: 'Enable or disable rate limit for this network. Max limit: NSE 3000 = 1000 Mbps, NSE 4000 = 2500 Mbps.'
                    default: disable
                  limit:
                    type: string
                    minimum: 1
                    maximum: 2500
                    pattern: ^\d{1,}$
                    description: Rate limit traffic per station in Mbps. NSE 3000 max = 1000, NSE 4000 max = 2500.
        ip_route:
          type: array
          default: []
          items:
            type: object
            additionalProperties: false
            required:
              - dest_network
              - dest_netmask
              - gateway
              - gateway_interface
            properties:
              dest_network:
                type: string
                pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$
              dest_netmask:
                type: string
                pattern: ^\d{1,}$
                minimum: 8
                maximum: 32
              gateway:
                type: string
                pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$
              gateway_interface:
                type: string
              gateway_metric:
                type: integer
    ip_groups:
      type: array
      default: []
      description: list of ip addresses
      maxItems: 16
      items:
        type: object
        additionalProperties: false
        required:
          - name
          - ip_address
        properties:
          name:
            type: string
            description: ip group name
            maxLength: 64
            pattern: ^[\w\-]{1,64}$
          desc:
            type: string
          ip_address:
            type: array
            items:
              type: string
              description: subnet, IP or iprange - 192.168.1.0/24 or 192.168.1.1 or 192.168.1.1-192.168.1.20
    user_groups:
      type: array
      default: []
      maxItems: 64
      items:
        type: object
        additionalProperties: false
        required:
          - name
        properties:
          name:
            type: string
            maxLength: 64
            pattern: ^[\w\-]{1,64}$
          desc:
            type: string
          source_subnets:
            type: array
            items:
              type: string
              description: single item as all or list of subnet/IP - 192.168.1.0/24 or 192.168.1.1
            maxItems: 100
