        5XX:
          description: Unexpected error
  /devices/{mac}/wifi_perf:
    get:
      tags:
        - Devices
      summary: Returns result of device wi-fiperf.
      description: |
        The Wi-Fi Performance uses HTTP POST to start the test and HTTP GET to retrieve the results. The MAC address of the AP running the test. It is supported only for cnPilot E and cnPilot R series device. <br/> <br/> **Note**: Minimum supported software version for cnPilot E is 3.2 and cnPilot R is 4.3.3. WifiPerf daemon should be running on both endpoints. WifiPerf performance interoperates with the open source zapwireless tool. Download instructions are provided in cnMaestro user guide (https://support.cambiumnetworks.com/files/cnmaestro/).
      producers:
        - application/json
      parameters:
        - $ref: '#/components/parameters/mac'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/devices.yaml#device.action'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '422':
          description: Request params are malformed
        5XX:
          description: Unexpected error
    post:
      tags:
        - Devices
      summary: Initiate device wi-fiperf.
      description: |
        The Wi-Fi Performance uses HTTP POST to start the test and HTTP GET to retrieve the results. The MAC address of the AP running the test. It is supported only for cnPilot E and cnPilot R series device.<br/> <br/> **Note** Minimum supported software version for cnPilot E is 3.2 and cnPilot R is 4.3.3. WifiPerf daemon should be running on both endpoints. WifiPerf performance interoperates with the open source zapwireless tool. Download instructions are provided in cnMaestro user guide (https://support.cambiumnetworks.com/files/cnmaestro/).
      parameters:
        - $ref: '#/components/parameters/mac'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/body-27'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/devices.yaml#device.action'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '422':
          description: Request params are malformed
        5XX:
          description: Unexpected error
  /devices/{mac}/disconnect_clients:
    get:
      tags:
        - Devices
      summary: Returns result of client disconnect.
      description: |
        The Client Disconnect uses HTTP POST to start the client disconnect and HTTP GET to retrieve the results. The MAC address of the AP on which clients will be disconnected.
      producers:
        - application/json
      parameters:
        - $ref: '#/components/parameters/mac'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/devices.yaml#device.action'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '422':
          description: Request params are malformed
        5XX:
          description: Unexpected error
    post:
      tags:
        - Devices
      summary: Initiate client disconnect.
      description: |
        The Client Disconnect uses HTTP POST to start the client disconnect and HTTP GET to retrieve the results. The MAC address of the AP on which clients will be disconnected.
