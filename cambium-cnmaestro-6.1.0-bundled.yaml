              sdr:
                type: object
                description: "SDR (Software Defined Radio) band assignments per AP model family."
                properties:
                  xv3_8:
                    type: object
                    description: "Band assignments for XV3-8 model."
                    properties:
                      radio_1_band:
                        type: string
                        description: "Band assignment for radio 1 (2.4ghz/5ghz)."
                      radio_2_band:
                        type: string
                        description: "Band assignment for radio 2."
                      sbs_mode:
                        type: string
                        description: "SBS (Simultaneous Band Select) mode."
                  xe3_4:
                    type: object
                    description: "Band assignments for XE3-4 model."
                    properties:
                      radio_1_band:
                        type: string
                        description: "Band assignment for radio 1."
                      radio_2_band:
                        type: string
                        description: "Band assignment for radio 2."
                      radio_3_band:
                        type: string
                        description: "Band assignment for radio 3 (6ghz)."
                  xe5_8:
                    type: object
                    description: "Band assignments for XE5-8 model."
