                      type: string
                      description: "RADIUS filter ID mapped to this user group."
                    acp:
                      type: string
                      description: "Access control policy assigned to this user group."
                    vlan:
                      type: integer
                      description: "VLAN assigned to this user group."
              device_policies:
                type: array
                description: "Per device-type ACP assignments."
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      description: "Device policy name."
                    device_class:
                      type: string
                      description: "Device class (ap/client/etc.)."
                    device_type:
                      type: string
                      description: "Device type identifier."
                    acp:
                      type: string
                      description: "Access control policy assigned to this device type."
          dhcp:
            type: array
            nullable: true
            description: "DHCP pool configurations."
            items:
              type: object
