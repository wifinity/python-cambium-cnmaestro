  /devices/{mac}/pull_config:
    get:
      tags:
        - Devices
      summary: Returns result of device pull configuration request.
      description: |
        This API will return the results of the POST pull_config request.
      producers:
        - application/json
      parameters:
        - $ref: '#/components/parameters/mac'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/devices.yaml#device.action'
        '400':
          description: Bad Request
        '404':
          description: Not Found
        '422':
          description: Request params are malformed
        5XX:
          description: Unexpected error
    post:
      tags:
        - Devices
      summary: Initiate device pull configuration request.
      description: |
        This API will send a pull configuration request to the device which will return its configuration file to later be retrieved using the GET API.
      parameters:
