            - EX1010-P
            - TX2020R-P
            - TX2012R-P
            - TX2028RF-P
            - TX1012-P-AC
            - TX1012-P-DC
            - EX3028R-P
            - EX3052R-P
            - EX3024F
        target_managed_account:
          description: Managed account ID to which the device should be moved
          type: string
        approved:
          description: Pre-approve the device after claim
          type: boolean
        description:
          description: Basic information about the device
          type: string
          default: ''
        latitude:
          description: Latitude coordinate (in decimal format) of the Device
          type: number
          minimum: -90
          maximum: 90
        longitude:
          description: Longitude coordinate (in decimal format) of the Device
          type: number
          minimum: -180
          maximum: 180
        name:
          description: Name of the Device
          type: string
          minLength: 2
          maxLength: 64
        network:
          description: Name of the network
          type: string
          minLength: 1
        software_version:
          description: Software version to be applied at the time of device onboarding
          type: string
          minLength: 3
        template:
          description: The target template name to be applied on the device
          type: string
        tower:
          description: Name of the tower
          type: string
          minLength: 1
        site:
          description: Name of the site
          type: string
          minLength: 1
        overrides:
          description: Override variables for cnMatrix devices
          type: object
          additionalProperties: false
          properties:
            location:
              description: Set the device location
              type: string
              minLength: 1
              maxLength: 64
            vlan_list:
              description: Add vlans to device
              type: array
              items:
                type: object
                additionalProperties: false
                required:
                  - vlan_id
                properties:
                  vlan_id:
                    description: vlan id
                    type: integer
                    minimum: 1
                    maximum: 4094
                  igmp_snooping:
                    description: enable/disable igmp snooping
                    type: boolean
                  igmp_querier:
                    description: enable/disable igmp querier
                    type: boolean
                  querier_ip_address:
                    description: action required
                    type: string
                    format: CNS_IPv4
                  dhcp_client:
                    description: enable/disable DHCP client
                    type: boolean
                  ip_address:
                    description: DHCP client IP address
                    type: string
                    format: CNS_IPv4
                  subnet_mask:
                    description: DHCP subnet option value
                    type: string
                    format: CNS_IPv4
                  vlan_interface_state:
                    description: enable/disable vlan interface
                    type: boolean
                  admin_state:
                    description: enable/disable administrative state
                    type: boolean
            enable_stp_overrides:
              description: enable/disable spanning tree override
              type: boolean
            cambium_stp_mode:
              description: enable cambium stp mode
              type: boolean
            stp_priority:
              description: stp priority, if RSTP
              type: integer
            pvrst_priority_list:
              type: array
              description: pvrst priority list
              items:
                type: object
                additionalProperties: false
                properties:
                  vlan:
                    description: vlan
                    type: integer
                  stp_priority:
                    description: stp priority
                    type: integer
            ip_routes_overrides:
              description: enable/disable ip routes overrides
              type: boolean
            default_gateway:
              description: default gateway
              type: string
              oneOf:
                - format: CNS_IPv4
                - enum:
                    - ''
            ip_routes:
              description: IP Routes
              type: array
              items:
                type: object
                additionalProperties: false
                properties:
                  destination_network:
                    description: destination network address
                    type: string
                    format: CNS_IPv4
                  next_hop:
                    description: next hop address
                    type: string
                    format: CNS_IPv4
                  subnet_mask:
                    description: subnet mask address
                    type: string
                    format: CNS_IPv4
                  distance:
                    description: distance
                    type: integer
                    minimum: 1
                    maximum: 255
            enable_pba_localization_override:
              description: enable/disable pba localization override
              type: boolean
            attach_device_localization:
              description: attach device localization
              type: string
              maxLength: 32
            enable_dhcp_pool:
              type: boolean
              description: enable/disable DHCP server pool
            dhcp_pool_list:
              description: DHCP Server Pool list
              type: array
              items:
                type: object
                additionalProperties: false
                required:
                  - pool_name
                  - pool_id
                  - start_ip_address
                  - end_ip_address
                  - subnet_pool
                  - subnet_mask
                properties:
                  pool_name:
                    description: name of pool
                    type: string
                    maxLength: 64
                  pool_id:
                    description: id of pool
                    type: integer
                    minimum: 1
                    maximum: 16
                  start_ip_address:
                    description: start ip address
                    type: string
                    format: CNS_IPv4
                  end_ip_address:
                    description: end ip address
                    type: string
                    format: CNS_IPv4
                  subnet_pool:
                    description: ip address
                    type: string
                    format: CNS_IPv4
                  subnet_mask:
                    description: subnet mask
                    type: string
                    format: CNS_IPv4
                  lease_time_in_seconds:
                    description: Lease in seconds
                    type: integer
                    minimum: 0
                  utilization_threshold:
                    description: utilization threshold percentage
                    type: integer
                    minimum: 0
                    maximum: 100
