  /devices/{mac}/traceroute:
    get:
      tags:
        - Devices
      summary: Returns result of device traceroute.
      description: |
        The Traceroute Test uses HTTP POST to start the test and HTTP GET to retrieve the results. The MAC address of the device running the test.
      producers:
        - application/json
