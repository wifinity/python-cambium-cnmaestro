                description: Specify wan port on which nat is required
                type: string
                enum:
                  - wan1
                  - wan2
                default: wan1
              lan_IP:
                type: string
                pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$
              protocol:
                type: string
                default: tcp
                enum:
                  - tcp
                  - udp
              public_IP:
                type: string
                pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$
        nat_one_many:
          type: array
          default: []
          minItems: 0
          maxItems: 16
          items:
            type: object
            additionalProperties: false
            properties:
              wan_port:
                type: string
                description: Specify wan port on which nat is required
                enum:
                  - wan1
                  - wan2
                default: wan1
              lan_IP:
                type: string
                pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$
              lan_port:
                type: string
                minimum: 1
                maximum: 65535
              port:
                type: string
                minimum: 1
                maximum: 65535
              protocol:
                type: string
                default: tcp
                enum:
                  - tcp
                  - udp
              public_IP:
                type: string
                pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$
        port_forward_rule:
          type: array
          default: []
          minItems: 0
          maxItems: 16
          items:
            type: object
            additionalProperties: false
            properties:
              wan_port:
                description: Specify wan port on which nat is required
                type: string
                enum:
                  - wan1
                  - wan2
                default: wan1
              desc:
                type: string
                maxLength: 64
              lan_IP:
                type: string
                pattern: ^(?!255\.255\.255\.255)(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)\.(25[0-5]|2[0-4]\d|[01]?\d\d?)$
              lan_port:
                type: string
                minimum: 1
                maximum: 65535
              port:
                type: string
                minimum: 1
                maximum: 65535
              protocol:
                type: string
                default: tcp
                enum:
                  - tcp
                  - udp
              wan_ip_address:
                type: string
                pattern: ^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)(?:\/(?:3[0-2]|[12]?[0-9]))?$
                description: ip or subnet
              wan_ip_group:
                type: array
                items:
                  type: string
                  description: ip-group name
              allow_all_sources:
                type: boolean
                default: true
        geoip_inbound_countries:
          description: Configure comma seperated list of country codes (ISO 3166-1 alpha-2)
          type: string
        geoip_inbound_mode:
          type: string
          enum:
            - allow
            - block
            - none
        geoip_outbound_countries:
          description: Configure comma seperated list of country codes (ISO 3166-1 alpha-2)
          type: string
        geoip_outbound_mode:
          type: string
          enum:
            - allow
            - block
            - none
        geoip_inbound_allow_list:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
