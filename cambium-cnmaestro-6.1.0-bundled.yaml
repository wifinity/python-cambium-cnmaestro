                      type: integer
                      description: "Minimum transmit power (dBm) for dynamic power control."
                    auto_rf_dynamic_power_max_tx_pow:
                      type: integer
                      description: "Maximum transmit power (dBm) for dynamic power control."
                    auto_rf_dynamic_power_min_neighbour_threshold:
                      type: integer
                      description: "Minimum neighbour count threshold for dynamic power reduction."
                    auto_rf_dynamic_power_cellsize_overlap_threshold:
                      type: integer
                      description: "Cell size overlap threshold percentage for dynamic power."
                    beacon_interval:
                      type: integer
                      description: "Beacon broadcast interval in milliseconds."
                    channel:
                      type: string
                      description: "Operating channel (auto or specific channel number)."
                    channel_list:
                      type: string
                      description: "Allowed channel list."
                    channel_width:
                      type: integer
                      description: "Channel width in MHz (20/40/80/160)."
                    enhanced_roaming_threshold:
                      type: integer
                      description: "Enhanced roaming RSSI threshold (dBm)."
                    minimum_unicast_rate:
                      type: string
                      description: "Minimum unicast data rate in Mbps."
